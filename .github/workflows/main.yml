                              if data:
                                  piece_offset = offset % piece_size
                                  if piece_offset + chunk_size <= len(data):
                                      out_f.write(data[piece_offset:piece_offset+chunk_size])
                              offset += chunk_size
                      
                      if filepath.exists() and filepath.stat().st_size > 0:
                          size_mb = filepath.stat().st_size / 1e6
                          print(f'✅ {name} ({size_mb:.1f}MB)')
                          
                          # فشرده‌سازی ویدیو اگه خواسته بود
                          is_video = any(name.lower().endswith(ext) for ext in video_exts)
                          if is_video and video_quality != 'best':
