name: 🌐 Omni-Sniffer v3

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🎯 حالت'
        required: true
        type: choice
        options:
          - torrent (جستجوی تورنت)
          - torrent-download (دانلود از مگنت/تورنت)
          - media (شکار ویدیو از صفحه وب)
        default: 'torrent-download (دانلود از مگنت/تورنت)'
      query:
        description: '🔍 جستجو | 🧲 مگنت | 🌐 لینک صفحه'
        required: true
        type: string
      video_quality:
        description: '🎬 کیفیت ویدیو'
        required: false
        type: choice
        options:
          - best
          - 1080
          - 720
          - 480
          - 360
        default: '480'
      max_items:
        description: '🔢 حداکثر نتایج'
        required: false
        type: number
        default: 5
      split_mb:
        description: '📦 تیکه کردن > MB (0=نه)'
        required: false
        type: number
        default: 70

env:
  PYTHONUNBUFFERED: '1'

jobs:
  omni-job:
    name: ⚡️ Omni Job
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🛠️ Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl zip python3-pip
          pip3 install -q requests beautifulsoup4 yt-dlp

      - name: 🎯 Execute
        env:
          MODE: ${{ github.event.inputs.mode }}
          QUERY: ${{ github.event.inputs.query }}
          MAX: ${{ github.event.inputs.max_items }}
          SPLIT_MB: ${{ github.event.inputs.split_mb }}
          VIDEO_QUALITY: ${{ github.event.inputs.video_quality }}
        run: |
          python3 << 'PYEOF'
          import os, re, sys, subprocess, requests, json, time
          from datetime import datetime
          from pathlib import Path
          from urllib.parse import quote_plus, urljoin
          from bs4 import BeautifulSoup

          mode = os.environ['MODE']
          query = os.environ['QUERY'].strip()
          max_items = int(os.environ.get('MAX', 5))
          split_mb = int(os.environ.get('SPLIT_MB', 70))
          video_quality = os.environ.get('VIDEO_QUALITY', '480')

          H = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          quality_map = {
              'best': 'best',
              '1080': 'best[height<=1080]',
              '720': 'best[height<=720]',
              '480': 'best[height<=480]',
              '360': 'best[height<=360]'
          }
          yt_format = quality_map.get(video_quality, 'best[height<=480]')

          # ===== MODE 1: SEARCH =====
          if mode == 'torrent (جستجوی تورنت)':
              print(f'🧲 جستجوی تورنت: {query}')
              try:
                  resp = requests.get(f'https://torrentz2.nz/search?q={quote_plus(query)}', headers=H, timeout=15)
                  if resp.status_code == 200:
                      soup = BeautifulSoup(resp.text, 'html.parser')
                      results = []
                      for item in soup.select('dl dt')[:max_items]:
                          a = item.select_one('a')
                          if a:
                              results.append({
                                  'title': a.get_text(strip=True)[:80],
                                  'url': 'https://torrentz2.nz' + a.get('href', ''),
                                  'info': item.select_one('span').get_text(strip=True) if item.select_one('span') else ''
                              })
                      
                      if results:
                          ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
                          qs = re.sub(r'[^\w]', '_', query)[:30]
                          Path('searches').mkdir(exist_ok=True)
                          f = Path(f'searches/{qs}_{ts}.md')
                          md = f'# 🧲 {query}\n\n'
                          md += '| # | Title | Info | Link |\n|---|-------|------|------|\n'
                          for i, r in enumerate(results, 1):
                              md += f'| {i} | {r["title"]} | {r["info"]} | [Link]({r["url"]}) |\n'
                          f.write_text(md)
                          print(f'✅ {f}')
                      else:
                          print('😞 هیچی پیدا نشد')
                  else:
                      print(f'⚠️ {resp.status_code}')
              except Exception as e:
                  print(f'❌ {e}')

          # ===== MODE 2: TORRENT DOWNLOAD =====
          elif 'torrent-download' in mode:
              magnet = query.strip()
              if not magnet.startswith('magnet:'):
                  # شاید یه لینک torrent باشه
                  if magnet.startswith('http'):
                      print(f'📥 دانلود فایل تورنت: {magnet}')
                      try:
                          resp = requests.get(magnet, headers=H, timeout=15)
                          if resp.status_code == 200:
                              torrent_path = Path('/tmp/temp.torrent')
                              torrent_path.write_bytes(resp.content)
                              print(f'✅ فایل تورنت دانلود شد')
                          else:
                              print(f'❌ خطای {resp.status_code}')
                              sys.exit(1)
                      except Exception as e:
                          print(f'❌ {e}')
                          sys.exit(1)
                  else:
                      print('❌ لینک مگنت یا تورنت معتبر وارد کن')
                      sys.exit(1)
              else:
                  print(f'🧲 مگنت دریافت شد')
                  # دانلود فایل تورنت از مگنت
                  try:
                      subprocess.run([
                          'curl', '-L', '-o', '/tmp/temp.torrent',
                          f'https://itorrents.org/torrent/{magnet.split("btih:")[-1].split("&")[0]}.torrent'
                      ], check=False, timeout=15)
                  except:
                      pass

              out_dir = Path('downloads') / datetime.now().strftime('%Y%m%d_%H%M%S')
              out_dir.mkdir(parents=True, exist_ok=True)

              if Path('/tmp/temp.torrent').exists():
                  print('🔄 استفاده از webtor.io برای تبدیل به لینک مستقیم...')
                  try:
                      # Upload torrent to webtor.io
                      with open('/tmp/temp.torrent', 'rb') as f:
                          upload_resp = requests.post('https://webtor.io/api/torrents', files={'torrent': f}, timeout=30)
                      if upload_resp.status_code == 200:
                          data = upload_resp.json()
                          info_hash = data.get('infoHash', '')
                          if info_hash:
                              print(f'✅ تورنت آپلود شد. InfoHash: {info_hash}')
                              # حالا فایل‌ها رو لیست کن
                              files_resp = requests.get(f'https://webtor.io/api/torrents/{info_hash}', timeout=15)
                              if files_resp.status_code == 200:
                                  files_data = files_resp.json()
                                  files_list = files_data.get('files', [])
                                  video_files = [f for f in files_list if any(f['name'].lower().endswith(ext) for ext in ['mp4', 'mkv', 'webm', 'avi'])]
                                  
                                  if video_files:
                                      print(f'🎬 {len(video_files)} فایل ویدیویی پیدا شد')
                                      for vf in video_files[:max_items]:
                                          name = vf['name']
                                          # لینک مستقیم از webtor.io
                                          direct_url = f'https://webtor.io/api/torrents/{info_hash}/files/{quote_plus(name)}/download'
                                          print(f'📥 دانلود: {name}')
                                          # با curl دانلود کن
                                          ret = subprocess.run([
                                              'curl', '-L', '--retry', '3', '-A', H['User-Agent'],
                                              '-o', str(out_dir / name), direct_url
                                          ], check=False)
                                          if ret.returncode == 0:
                                              size = (out_dir / name).stat().st_size / 1e6
                                              print(f'   ✅ {size:.1f}MB')
                                              if split_mb > 0 and size > split_mb:
                                                  subprocess.run(['zip', '-j', '-s', f'{split_mb}m', str(out_dir / name) + '.zip', str(out_dir / name)], check=False)
                                                  (out_dir / name).unlink()
                                  else:
                                      print('😞 فایل ویدیویی در تورنت پیدا نشد')
                  except Exception as e:
                      print(f'❌ {e}')
              else:
                  print('❌ نتونستم فایل تورنت رو دریافت کنم')

          # ===== MODE 3: MEDIA =====
          elif 'media' in mode:
              url = query
              if not url.startswith('http'):
                  url = 'https://' + url
              
              print(f'🕷️ بررسی: {url}')
              out_dir = Path('downloads') / datetime.now().strftime('%Y%m%d_%H%M%S')
              out_dir.mkdir(parents=True, exist_ok=True)

              # yt-dlp
              print('🎥 شکار با yt-dlp...')
              subprocess.run([
                  'yt-dlp', '--no-warnings', '--format', yt_format,
                  '--output', str(out_dir / '%(title)s.%(ext)s'),
                  '--merge-output-format', 'mp4',
                  '--user-agent', H['User-Agent'],
                  '--max-downloads', str(max_items),
                  url
              ], check=False)

              # فایل‌های غیر ویدیویی
              try:
                  resp = requests.get(url, headers=H, timeout=15, allow_redirects=True)
                  if resp.status_code == 200:
                      soup = BeautifulSoup(resp.text, 'html.parser')
                      base_url = resp.url
                      for tag in soup.find_all('a'):
                          href = tag.get('href', '')
                          if href:
                              full = urljoin(base_url, href)
                              if any(full.lower().endswith(f'.{ext}') for ext in ['zip','rar','7z','exe','pdf','iso','apk','torrent']):
                                  name = full.split('/')[-1].split('?')[0]
                                  subprocess.run(['curl', '-L', '-A', H['User-Agent'], '-o', str(out_dir / name), full], check=False)
              except: pass

          PYEOF

      - name: 📤 Push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p downloads searches
          git add downloads/ searches/
          git diff --cached --quiet && exit 0
          git commit -m "📦 [${MODE}] $QUERY" --quiet
          for i in 1 2 3; do
            git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null && exit 0
            sleep 3
          done
