name: 🧲 Torrent Pro

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🎯 حالت'
        required: true
        type: choice
        options:
          - search (جستجوی تورنت)
          - download (دانلود تورنت)
        default: 'download (دانلود تورنت)'
      query:
        description: '🔍 عبارت | 🌐 لینک صفحه تورنت'
        required: true
        type: string
      split_mb:
        description: '📦 تکه کردن > MB (0=نه)'
        required: false
        type: number
        default: 70

jobs:
  torrent-job:
    name: ⚡️ دانلود پیشرفته تورنت
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ آماده‌سازی محیط
        run: |
          echo "📦 نصب Node.js و ابزارها..."
          sudo apt-get update -qq 2>/dev/null || true
          sudo apt-get install -y -qq curl zip python3-pip nodejs npm 2>/dev/null || true
          pip3 install -q requests beautifulsoup4 2>/dev/null
          npm install webtorrent 2>/dev/null
          echo "✅ همه چیز آماده است!"

      - name: 🎯 اجرای عملیات
        env:
          MODE: ${{ github.event.inputs.mode }}
          QUERY: ${{ github.event.inputs.query }}
          SPLIT_MB: ${{ github.event.inputs.split_mb }}
          SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxuapQ3OQKFOGxZchcCEdjzgz6IWoBs889IUv2lX6AqnxPUCiNoVveJMhZc5uMPMG3BTw/exec'
        run: |
          python3 << 'PYEOF'
          import os, re, sys, subprocess, json
          from pathlib import Path
          from datetime import datetime
          from urllib.parse import quote_plus
          import requests
          from bs4 import BeautifulSoup

          mode = os.environ['MODE']
          query = os.environ['QUERY'].strip()
          split_mb = int(os.environ.get('SPLIT_MB', 70))
          SCRIPT_URL = os.environ.get('SCRIPT_URL', '')

          H = {'User-Agent': 'Mozilla/5.0'}

          # ... (بخش جستجوی تورنت بدون تغییر) ...

          elif mode == 'download (دانلود تورنت)':
              print(f'🕷️ استخراج از: {query}')
              
              # استخراج info_hash (مثل قبل)
              info_hash = None
              if query.startswith('magnet:'):
                  m = re.search(r'btih:([a-fA-F0-9]{40})', query)
                  if m: info_hash = m.group(1).lower()
              else:
                  resp = requests.get(query, headers=H, timeout=15)
                  if resp.status_code == 200:
                      soup = BeautifulSoup(resp.text, 'html.parser')
                      magnet_tag = soup.select_one('a[href^="magnet:"]')
                      if magnet_tag:
                          m = re.search(r'btih:([a-fA-F0-9]{40})', magnet_tag.get('href'))
                          if m: info_hash = m.group(1)
                      if not info_hash:
                          found = re.findall(r'([a-fA-F0-9]{40})', resp.text)
                          if found: info_hash = found[0]
              
              if not info_hash:
                  print('❌ نتونستم info_hash رو پیدا کنم')
                  sys.exit(1)
              
              print(f'✅ Info Hash: {info_hash}')
              
              # دانلود با WebTorrent
              magnet_link = f'magnet:?xt=urn:btih:{info_hash}'
              out_dir = f'downloads/{datetime.now().strftime("%Y%m%d_%H%M%S")}'
              
              print(f'🚀 شروع دانلود با WebTorrent...')
              node_script = f"""
              const WebTorrent = require('webtorrent');
              const path = require('path');
              const fs = require('fs');
              
              const client = new WebTorrent();
              const magnetURI = '{magnet_link}';
              const outputDir = '{out_dir}';
              
              if (!fs.existsSync(outputDir)) {{
                  fs.mkdirSync(outputDir, {{ recursive: true }});
              }}
              
              client.add(magnetURI, function (torrent) {{
                  console.log(`Client is downloading: ${{torrent.name}}`);
                  
                  torrent.files.forEach(function (file) {{
                      const targetPath = path.join(outputDir, file.name);
                      console.log(`Starting download of: ${{file.name}}`);
                      
                      const stream = file.createReadStream();
                      const writeStream = fs.createWriteStream(targetPath);
                      
                      stream.pipe(writeStream);
                      
                      writeStream.on('finish', function() {{
                          console.log(`✅ Finished: ${{file.name}}`);
                          client.destroy();
                      }});
                  }});
              }});
              """
              
              with open('/tmp/download.js', 'w') as f:
                  f.write(node_script)
              
              subprocess.run(['node', '/tmp/download.js'], check=False)
              
              # تیکه‌تکه کردن (مثل قبل)
              out_path = Path(out_dir)
              if out_path.exists():
                  for f in out_path.iterdir():
                      if f.is_file():
                          size_mb = f.stat().st_size / 1e6
                          print(f'✅ {f.name} ({size_mb:.1f}MB)')
                          if split_mb > 0 and size_mb > split_mb:
                              print(f'✂️ در حال تیکه‌تکه کردن...')
                              subprocess.run(['zip', '-j', '-s', f'{split_mb}m', str(f) + '.zip', str(f)], check=False)
                              f.unlink()
          PYEOF

      - name: 📤 آپلود نتیجه
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p downloads searches
          git add downloads/ searches/ 2>/dev/null
          git diff --cached --quiet && exit 0
          git commit -m "📦 دانلود تورنت جدید" --quiet
          for i in 1 2 3; do git pull --rebase --quiet && git push --quiet && exit 0; sleep 3; done
