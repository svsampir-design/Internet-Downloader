name: 🧲 Torrent Pro Max

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🎯 حالت'
        required: true
        type: choice
        options:
          - search (جستجوی تورنت)
          - download (دانلود تورنت)
        default: 'download (دانلود تورنت)'
      query:
        description: '🔍 عبارت | 🧲 مگنت | 🌐 لینک صفحه'
        required: true
        type: string
      max_items:
        description: '🔢 حداکثر فایل'
        required: false
        type: number
        default: 3
      video_quality:
        description: '🎬 حداکثر کیفیت (best=بدون تغییر)'
        required: false
        type: choice
        options: [best, 1080, 720, 480, 360]
        default: '480'
      split_mb:
        description: '📦 تکه کردن > MB (0=نه)'
        required: false
        type: number
        default: 70

env:
  PYTHONUNBUFFERED: '1'

jobs:
  torrent-job:
    name: ⚡️ دانلود تورنت با Transmission
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ نصب ابزارها
        run: |
          sudo apt-get update -qq 2>/dev/null || true
          sudo apt-get install -y -qq curl zip python3-pip ffmpeg transmission-daemon transmission-cli 2>/dev/null || true
          pip3 install -q requests beautifulsoup4 2>/dev/null
          # پیکربندی اولیه transmission
          sudo systemctl stop transmission-daemon 2>/dev/null || true
          mkdir -p ~/.config/transmission-daemon
          echo '{"download-dir": "/tmp/dl", "incomplete-dir": "/tmp/incomplete", "rpc-whitelist": "127.0.0.1", "rpc-whitelist-enabled": false, "dht-enabled": true, "lds-enabled": true, "pex-enabled": true, "utp-enabled": true}' > ~/.config/transmission-daemon/settings.json
          transmission-daemon -g ~/.config/transmission-daemon
          sleep 2
          echo "✅ Transmission آماده است!"

      - name: 🎯 اجرا
        env:
          MODE: ${{ github.event.inputs.mode }}
          QUERY: ${{ github.event.inputs.query }}
          MAX: ${{ github.event.inputs.max_items }}
          SPLIT_MB: ${{ github.event.inputs.split_mb }}
          VIDEO_QUALITY: ${{ github.event.inputs.video_quality }}
        run: |
          python3 << 'PYEOF'
          import os, re, sys, subprocess, time, shutil
          from pathlib import Path
          from datetime import datetime
          from urllib.parse import quote_plus
          import requests
          from bs4 import BeautifulSoup

          mode = os.environ['MODE']
          query = os.environ['QUERY'].strip()
          max_items = int(os.environ.get('MAX', 3))
          split_mb = int(os.environ.get('SPLIT_MB', 70))
          video_quality = os.environ.get('VIDEO_QUALITY', '480')

          H = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          def format_size(sz):
              for unit in ['B','KB','MB','GB']:
                  if sz < 1024.0:
                      return f"{sz:.1f} {unit}"
                  sz /= 1024.0
              return f"{sz:.1f} TB"

          def compress_video(inp, outp, quality):
              if quality == 'best':
                  shutil.move(inp, outp)
                  return outp
              print(f'   🔄 فشرده‌سازی به {quality}p...')
              subprocess.run([
                  'ffmpeg', '-i', inp,
                  '-vf', f'scale=-2:{quality}',
                  '-c:v', 'libx264', '-crf', '23',
                  '-c:a', 'aac', '-b:a', '128k',
                  '-movflags', '+faststart',
                  '-y', outp
              ], check=False, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              if os.path.exists(outp) and os.path.getsize(outp) > 0:
                  os.remove(inp)
                  return outp
              return inp

          # ====== MODE: SEARCH ======
          if mode == 'search (جستجوی تورنت)':
              print(f'🧲 جستجو: {query}')
              resp = requests.get(f'https://torrentz2.nz/search?q={quote_plus(query)}', headers=H, timeout=15)
              if resp.status_code == 200:
                  soup = BeautifulSoup(resp.text, 'html.parser')
                  results = []
                  for item in soup.select('dl dt')[:max_items]:
                      a = item.select_one('a')
                      info = item.select_one('span')
                      if a:
                          title = a.get_text(strip=True)[:80]
                          url = 'https://torrentz2.nz' + a.get('href', '')
                          infotxt = info.get_text(strip=True) if info else ''
                          # استخراج حجم
                          s_m = re.search(r'([\d.]+)\s*(GB|MB|KB)', infotxt, re.I)
                          sz = f'{s_m.group(1)} {s_m.group(2).upper()}' if s_m else 'نامشخص'
                          results.append({'title': title, 'url': url, 'info': infotxt, 'size': sz})
                  if results:
                      ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
                      qs = re.sub(r'[^\w]', '_', query)[:30]
                      Path('searches').mkdir(exist_ok=True)
                      f = Path(f'searches/{qs}_{ts}.md')
                      md = f'# 🧲 {query}\n\n| # | Title | Size | Seed/Leech | Link |\n|---|-------|------|------------|------|\n'
                      for i, r in enumerate(results, 1):
                          md += f'| {i} | {r["title"][:50]} | {r["size"]} | {r["info"][:30]} | [Page]({r["url"]}) |\n'
                      f.write_text(md)
                      print(f'✅ گزارش: {f}')
                  else:
                      print('😞 هیچی پیدا نشد')
              else:
                  print(f'⚠️ {resp.status_code}')

          # ====== MODE: DOWNLOAD ======
          elif mode == 'download (دانلود تورنت)':
              magnet_link = query if query.startswith('magnet:') else None
              if not magnet_link:
                  print(f'🕷️ استخراج مگنت از: {query}')
                  try:
                      resp = requests.get(query, headers=H, timeout=15, allow_redirects=True)
                      if resp.status_code == 200:
                          soup = BeautifulSoup(resp.text, 'html.parser')
                          m_tag = soup.select_one('a[href^="magnet:"]')
                          if m_tag:
                              magnet_link = m_tag.get('href')
                          else:
                              found = re.findall(r'magnet:\?xt=urn:btih:[a-fA-F0-9]{40}[^\s"\'<>]*', resp.text)
                              if found:
                                  magnet_link = found[0]
                          if not magnet_link:
                              h = re.search(r'([a-fA-F0-9]{40})', resp.text)
                              if h:
                                  magnet_link = f'magnet:?xt=urn:btih:{h.group(1)}'
                  except Exception as e:
                      print(f'❌ {e}')
                      sys.exit(1)
              if not magnet_link:
                  print('❌ مگنت پیدا نشد')
                  sys.exit(1)

              print(f'🧲 اضافه کردن به Transmission...')
              # اضافه کردن torrent با transmission-remote
              subprocess.run(['transmission-remote', '-a', magnet_link], check=False)
              time.sleep(5)

              # منتظر دریافت metadata
              print('⏳ منتظر metadata...')
              for _ in range(60):
                  res = subprocess.check_output(['transmission-remote', '-l'], text=True).strip()
                  if 'magnet' not in res and 'Idle' not in res:
                      break
                  time.sleep(5)

              # انتظار برای اتمام دانلود
              print('📥 دانلود در حال پیشرفت...')
              while True:
                  res = subprocess.check_output(['transmission-remote', '-l'], text=True).strip()
                  # Transmission output: ID Done Have ETA Up Down Ratio Status Name
                  lines = res.split('\n')
                  if len(lines) < 2:
                      break
                  for line in lines[1:]:
                      parts = line.split()
                      if len(parts) < 9:
                          continue
                      done = parts[1]
                      status = parts[-2] if len(parts) > 8 else ''
                      name = ' '.join(parts[8:])
                      if '100%' in done:
                          print(f'\n✅ دانلود کامل شد: {name}')
                          break
                  else:
                      # نمایش پیشرفت
                      for line in lines[1:]:
                          parts = line.split()
                          if len(parts) >= 4:
                              print(f'\r📊 {parts[1]} done | ↓ {parts[5]} | ↑ {parts[6]}', end='')
                      time.sleep(5)
                      continue
                  break

              # خاموش کردن torque (اختیاری)
              subprocess.run(['transmission-remote', '--exit'], check=False)
              time.sleep(2)

              # انتقال فایل‌ها از پوشه دانلود پیش‌فرض (توی تنظیمات گذاشتیم /tmp/dl)
              download_dir = Path('/tmp/dl')
              if download_dir.exists():
                  out_dir = Path('downloads') / datetime.now().strftime('%Y%m%d_%H%M%S')
                  out_dir.mkdir(parents=True, exist_ok=True)
                  
                  video_exts = ['mp4', 'mkv', 'webm', 'avi', 'mov', 'm4v', 'ts']
                  for f in download_dir.iterdir():
                      if f.is_file():
                          dest = out_dir / f.name
                          if any(f.name.lower().endswith(ext) for ext in video_exts) and video_quality != 'best':
                              dest = out_dir / f'comp_{f.name}'
                              dest = compress_video(str(f), str(dest), video_quality)
                          else:
                              shutil.move(str(f), str(dest))
                          sz = dest.stat().st_size / 1e6
                          print(f'✅ {dest.name} ({sz:.1f}MB)')
                          if split_mb > 0 and sz > split_mb:
                              print(f'   ✂️ تکه‌تکه...')
                              subprocess.run(['zip', '-j', '-s', f'{split_mb}m', str(dest) + '.zip', str(dest)])
                              if list(dest.parent.glob(f'{dest.stem}.z*')):
                                  dest.unlink()
              else:
                  print('❌ پوشه دانلود خالی است!')
          PYEOF

      - name: 📤 آپلود نهایی
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p downloads searches
          git add downloads/ searches/ 2>/dev/null
          git diff --cached --quiet && exit 0
          git commit -m "📦 ${QUERY:0:50}" --quiet
          for i in 1 2 3; do git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null && exit 0; sleep 3; done             if int(progress) != last_progress:
                          print(f'\r📥 {progress:.1f}% | ↓ {s.download_rate/1024:.0f} KB/s | ↑ {s.upload_rate/1024:.0f} KB/s | Peers: {s.num_peers}', end='')
                          last_progress = int(progress)
                  
                  print('\n✅ دانلود کامل شد! استخراج فایل‌ها...')
                  
                  torinfo = handle.get_torrent_info()
                  files = torinfo.files()
                  
                  video_exts = ['mp4', 'mkv', 'webm', 'avi', 'mov', 'm4v', 'ts']
                  
                  for i_file in range(min(files.num_files(), max_items)):
                      f = files.file_at(i_file)
                      name = f.path.split('/')[-1]
                      filepath = out_dir / name
                      
                      # خوندن فایل از تورنت
                      with open(str(filepath), 'wb') as out_f:
                          piece_size = torinfo.piece_length()
                          total_size = f.size
                          offset = 0
                          while offset < total_size:
                              chunk_size = min(1024*1024, total_size - offset)  # 1MB chunks
                              data = handle.read_piece(offset // piece_size)
                              if data:
                                  piece_offset = offset % piece_size
                                  if piece_offset + chunk_size <= len(data):
                                      out_f.write(data[piece_offset:piece_offset+chunk_size])
                              offset += chunk_size
                      
                      if filepath.exists() and filepath.stat().st_size > 0:
                          size_mb = filepath.stat().st_size / 1e6
                          print(f'✅ {name} ({size_mb:.1f}MB)')
                          
                          # فشرده‌سازی ویدیو اگه خواسته بود
                          is_video = any(name.lower().endswith(ext) for ext in video_exts)
                          if is_video and video_quality != 'best':
                              compressed_path = out_dir / f'compressed_{name}'
                              filepath = compress_video(filepath, compressed_path, video_quality)
                              size_mb = filepath.stat().st_size / 1e6
                              print(f'   📉 بعد از فشرده‌سازی: {size_mb:.1f}MB')
                          
                          # تیکه‌تکه کردن
                          if split_mb > 0 and size_mb > split_mb:
                              print(f'   ✂️ تیکه‌تکه...')
                              subprocess.run([
                                  'zip', '-j', '-s', f'{split_mb}m',
                                  str(filepath) + '.zip', str(filepath)
                              ], check=False)
                              if list(filepath.parent.glob(f'{filepath.stem}.z*')):
                                  filepath.unlink()
                  
                  ses.remove_torrent(handle)
                  print('\n🎉 همه چی تموم شد!')
                  
              except ImportError:
                  print('❌ کتابخونه libtorrent نصب نیست. درحال نصب...')
                  subprocess.run(['pip3', 'install', 'python-libtorrent'], check=False)
                  print('🔄 لطفاً دوباره اجرا کن.')
                  sys.exit(1)
          PYEOF

      - name: 📤 آپلود
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p downloads searches
          git add downloads/ searches/ 2>/dev/null
          git diff --cached --quiet && exit 0
          git commit -m "📦 ${QUERY:0:50}" --quiet
          for i in 1 2 3; do git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null && exit 0; sleep 3; done
