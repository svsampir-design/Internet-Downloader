name: 🌐 Smart Bridge

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🌐 لینک صفحه'
        required: true
        type: string
      split_mb:
        description: '📦 تکه کردن > MB (0=نه)'
        required: false
        type: number
        default: 70

env:
  PYTHONUNBUFFERED: '1'
  WORKER_URL: 'https://script.google.com/macros/s/AKfycbxuapQ3OQKFOGxZchcCEdjzgz6IWoBs889IUv2lX6AqnxPUCiNoVveJMhZc5uMPMG3BTw/exec'

jobs:
  fetch:
    name: ⚡️ دریافت از طریق Worker
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ نصب
        run: sudo apt-get update -qq && sudo apt-get install -y -qq curl zip python3-pip && pip3 install -q requests

      - name: 🎯 اجرا
        env:
          PAGE_URL: ${{ github.event.inputs.url }}
          SPLIT_MB: ${{ github.event.inputs.split_mb }}
        run: |
          python3 << 'PYEOF'
          import os, subprocess, requests, sys, re
          from pathlib import Path
          from datetime import datetime

          page_url = os.environ['PAGE_URL']
          split_mb = int(os.environ.get('SPLIT_MB', 70))
          WORKER_URL = os.environ['WORKER_URL']

          print(f'🚀 درخواست به Worker برای: {page_url}')
          try:
              resp = requests.get(f'{WORKER_URL}/?url={page_url}', headers={'User-Agent': 'Mozilla/5.0'}, timeout=60)
              if resp.status_code != 200:
                  print(f'❌ Worker خطا داد: {resp.status_code}')
                  sys.exit(1)
              
              data = resp.json()
              if not data.get('links'):
                  print('😞 هیچ لینکی پیدا نشد. احتمالاً سایت قفل سختی داره.')
                  sys.exit(1)
              
              print(f'🎬 {len(data["links"])} لینک دریافت شد. درحال دانلود...')
              out_dir = Path('downloads') / datetime.now().strftime('%Y%m%d_%H%M%S')
              out_dir.mkdir(parents=True, exist_ok=True)
              
              for i, link in enumerate(data['links'], 1):
                  name = link.get('name', f'video_{i}')
                  dl_url = link.get('url')
                  print(f'📥 [{i}] {name}')
                  fpath = out_dir / name
                  ret = subprocess.run(['curl', '-L', '-A', 'Mozilla/5.0', '-o', str(fpath), dl_url], check=False)
                  if fpath.exists() and fpath.stat().st_size > 0:
                      size_mb = fpath.stat().st_size / 1e6
                      print(f'   ✅ {size_mb:.1f}MB')
                      if split_mb > 0 and size_mb > split_mb:
                          subprocess.run(['zip', '-j', '-s', f'{split_mb}m', str(fpath) + '.zip', str(fpath)])
                          fpath.unlink()
                  else:
                      print(f'   ❌ ناموفق')
              print('🎉 تموم شد!')
          except Exception as e:
              print(f'❌ خطا: {e}')
          PYEOF

      - name: 📤 آپلود
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add downloads/ 2>/dev/null
          git diff --cached --quiet && exit 0
          git commit -m "📦 از ${PAGE_URL}" --quiet
          for i in 1 2 3; do git pull --rebase --quiet && git push --quiet && exit 0; sleep 3; done
