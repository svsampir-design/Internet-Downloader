name: 🧲 Direct Torrent Searcher

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'نام دقیق (مثلاً The Pitt S02)'
        required: true
        type: string
      max_results:
        description: 'حداکثر نتایج'
        required: false
        type: number
        default: 10

env:
  PYTHONUNBUFFERED: '1'

jobs:
  search:
    name: 🎯 شکار لینک مستقیم
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: ⚡️ نصب و جستجو
        env:
          QUERY: ${{ github.event.inputs.query }}
          MAX: ${{ github.event.inputs.max_results }}
        run: |
          pip3 install -q requests beautifulsoup4 2>/dev/null
          python3 << 'PYEOF'
          import os, re, json, requests
          from datetime import datetime
          from pathlib import Path
          from urllib.parse import quote_plus

          query = os.environ['QUERY'].strip()
          max_r = int(os.environ.get('MAX', 10))
          results = []

          # روش پیشرفته: جستجوی 1337x (مطمئن‌ترین منبع آنلاین)
          print(f'🔍 جستجوی {query} در 1337x...')
          try:
              headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
              search_url = f'https://1337x.to/search/{quote_plus(query)}/1/'
              resp = requests.get(search_url, headers=headers, timeout=15)
              
              if resp.status_code == 200:
                  from bs4 import BeautifulSoup
                  soup = BeautifulSoup(resp.text, 'html.parser')
                  rows = soup.select('table.table-list tbody tr')
                  
                  for row in rows[:max_r]:
                      name_col = row.select_one('td.name a:nth-of-type(2)')
                      if name_col:
                          name = name_col.get_text(strip=True)
                          link = 'https://1337x.to' + name_col.get('href', '')
                          
                          # سعی کن اطلاعات بیشتر بگیری
                          seeds = row.select_one('td.seeds')
                          leeches = row.select_one('td.leeches')
                          size = row.select_one('td.size')
                          
                          seeds = seeds.get_text(strip=True) if seeds else '0'
                          leeches = leeches.get_text(strip=True) if leeches else '0'
                          size = size.get_text(strip=True) if size else 'N/A'
                          
                          results.append({
                              'title': name[:80],
                              'url': link,
                              'info': f'Seed: {seeds} | Leech: {leeches} | Size: {size}'
                          })
              else:
                  print(f'   ⚠️ وضعیت: {resp.status_code}')
          except Exception as e:
              print(f'   ❌ خطا: {e}')

          # اگر نتیجه داشت، مگنت بگیر
          if results:
              print(f'\n📥 استخراج لینک‌های مگنت...')
              for i, r in enumerate(results):
                  try:
                      resp2 = requests.get(r['url'], headers=headers, timeout=10)
                      if resp2.status_code == 200:
                          soup2 = BeautifulSoup(resp2.text, 'html.parser')
                          magnet_li = soup2.select_one('ul li a[href^="magnet:?xt="]')
                          if magnet_li:
                              results[i]['url'] = magnet_li.get('href', '')
                              results[i]['ext'] = 'magnet'
                          else:
                              results[i]['url'] = 'No magnet found'
                  except:
                      pass
                  print(f'   ✅ {i+1}/{len(results)}')
          
          # خروجی مشابه قبل
          if not results:
              print('😞 هیچی پیدا نشد.')
              exit(1)
          
          ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
          qs = re.sub(r'[^\w]', '_', query)[:30]
          Path('searches').mkdir(exist_ok=True)
          report = Path(f'searches/{qs}_{ts}.md')
          
          md = f'# 🧲 {query}\n\n**Results:** {len(results)}\n\n'
          md += '| # | Title | Info | Magnet |\n'
          md += '|---|-------|------|--------|\n'
          for i, r in enumerate(results, 1):
              title = r['title'].replace('|', '/')
              info = r.get('info', '').replace('|', '/')
              md += f'| {i} | {title} | {info} | [MAGNET]({r["url"]}) |\n'
          
          md += '\n---\n\n## 📝 جزئیات\n\n'
          for i, r in enumerate(results, 1):
              md += f'### {i}. {r["title"]}\n\n'
              md += f'```text\n{r["url"]}\n```\n\n'
              md += f'{r.get("info")}\n\n---\n\n'
          
          report.write_text(md)
          print(f'✅ گزارش: {report}')
          PYEOF

      - name: 📤 آپلود به گیت‌هاب
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p searches
          git add searches/
          git diff --cached --quiet && exit 0
          git commit -m "🧲 نتایج جستجوی ${{ github.event.inputs.query }}" --quiet
          for i in 1 2 3; do
            git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null && exit 0
            sleep 3
          done
          echo "❌ آپلود ناموفق"
          exit 1
