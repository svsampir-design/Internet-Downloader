name: 🧲 Torrent Master

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🎯 حالت'
        required: true
        type: choice
        options:
          - search (جستجوی تورنت)
          - download (دانلود تورنت)
        default: 'download (دانلود تورنت)'
      query:
        description: '🔍 عبارت | 🧲 مگنت | 🌐 لینک صفحه'
        required: true
        type: string
      video_quality:
        description: '🎬 کیفیت'
        required: false
        type: choice
        options: [best, 1080, 720, 480, 360]
        default: 'best'
      max_items:
        description: '🔢 حداکثر'
        required: false
        type: number
        default: 3
      split_mb:
        description: '📦 تکه > MB (0=نه)'
        required: false
        type: number
        default: 70

jobs:
  torrent:
    name: ⚡️ دانلود تورنت
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ نصب
        run: |
          pip3 install -q requests beautifulsoup4 seedrcc 2>/dev/null
          sudo apt-get install -y -qq curl zip ffmpeg 2>/dev/null || true
          echo "✅ آماده!"

      - name: 🎯 اجرا
        env:
          MODE: ${{ github.event.inputs.mode }}
          QUERY: ${{ github.event.inputs.query }}
          MAX: ${{ github.event.inputs.max_items }}
          SPLIT_MB: ${{ github.event.inputs.split_mb }}
          VIDEO_QUALITY: ${{ github.event.inputs.video_quality }}
          SEEDR_TOKEN: ${{ secrets.SEEDR_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, re, sys, subprocess, shutil, time
          from pathlib import Path
          from datetime import datetime
          from urllib.parse import quote_plus
          import requests
          from bs4 import BeautifulSoup
          from seedrcc import Seedr

          mode = os.environ['MODE']
          query = os.environ['QUERY'].strip()
          max_items = int(os.environ.get('MAX', 3))
          split_mb = int(os.environ.get('SPLIT_MB', 70))
          video_quality = os.environ.get('VIDEO_QUALITY', 'best')
          token = os.environ.get('SEEDR_TOKEN', '')

          if not token:
              print('❌ توکن Seedr تنظیم نشده!')
              sys.exit(1)

          seedr = Seedr(token=token, autoRefresh=True)
          H = {'User-Agent': 'Mozilla/5.0'}

          # ===== SEARCH =====
          if 'search' in mode:
              print(f'🧲 جستجو: {query}')
              resp = requests.get(f'https://torrentz2.nz/search?q={quote_plus(query)}', headers=H, timeout=15)
              if resp.status_code == 200:
                  soup = BeautifulSoup(resp.text, 'html.parser')
                  results = []
                  for item in soup.select('dl dt')[:max_items]:
                      a = item.select_one('a'); info = item.select_one('span')
                      if a:
                          t = a.get_text(strip=True)[:80]
                          u = 'https://torrentz2.nz' + a.get('href', '')
                          infotxt = info.get_text(strip=True) if info else ''
                          sm = re.search(r'([\d.]+)\s*(GB|MB|KB)', infotxt, re.I)
                          sz = f'{sm.group(1)} {sm.group(2).upper()}' if sm else 'نامشخص'
                          results.append({'t':t,'u':u,'i':infotxt,'s':sz})
                  if results:
                      ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
                      qs = re.sub(r'[^\w]', '_', query)[:30]
                      Path('searches').mkdir(exist_ok=True)
                      f = Path(f'searches/{qs}_{ts}.md')
                      md = f'# 🧲 {query}\n\n| # | Title | Size | Info | Link |\n|---|-------|------|------|------|\n'
                      for i,r in enumerate(results,1):
                          md += f'| {i} | {r["t"][:50]} | {r["s"]} | {r["i"][:30]} | [Page]({r["u"]}) |\n'
                      f.write_text(md)
                      print(f'✅ {f}')
                  else: print('😞 هیچی')

          # ===== DOWNLOAD =====
          elif 'download' in mode:
              magnet = query if query.startswith('magnet:') else None
              
              if not magnet:
                  print(f'🕷️ استخراج مگنت از: {query}')
                  try:
                      resp = requests.get(query, headers=H, timeout=15, allow_redirects=True)
                      if resp.status_code == 200:
                          soup = BeautifulSoup(resp.text, 'html.parser')
                          mt = soup.select_one('a[href^="magnet:"]')
                          if mt:
                              magnet = mt.get('href')
                          else:
                              m = re.search(r'magnet:\?xt=urn:btih:[a-fA-F0-9]{40}[^\s"\'<>]*', resp.text)
                              if m: magnet = m.group(0)
                              else:
                                  h = re.search(r'([a-fA-F0-9]{40})', resp.text)
                                  if h: magnet = f'magnet:?xt=urn:btih:{h.group(1).lower()}'
                  except: pass
              
              if not magnet:
                  print('❌ مگنت پیدا نشد')
                  sys.exit(1)
              
              print(f'🧲 {magnet[:60]}...')
              
              # آپلود به Seedr
              print('📤 آپلود به Seedr...')
              seedr.addTorrent(magnet)
              
              # منتظر دانلود
              print('⏳ منتظر دانلود در Seedr...')
              file_info = None
              for _ in range(120):  # حداکثر 10 دقیقه
                  time.sleep(5)
                  folders = seedr.listContents().get('folders', [])
                  for folder in folders:
                      for f in folder.get('files', []):
                          if f.get('progress') == 100:
                              file_info = f
                              break
                      if file_info: break
                  if file_info: break
                  print('.', end='', flush=True)
              
              if not file_info:
                  print('\n❌ دانلود در Seedr تموم نشد')
                  sys.exit(1)
              
              print(f'\n✅ {file_info["name"]} ({file_info["size"]/1e6:.1f}MB)')
              
              # گرفتن لینک مستقیم
              print('🔗 گرفتن لینک مستقیم...')
              dl_url = seedr.getFile(file_info['id'])
              
              # دانلود با curl
              out_dir = Path('downloads') / datetime.now().strftime('%Y%m%d_%H%M%S')
              out_dir.mkdir(parents=True, exist_ok=True)
              fpath = out_dir / file_info['name']
              
              print(f'📥 دانلود: {file_info["name"]}')
              subprocess.run(['curl', '-L', '--retry', '3', '-A', 'Mozilla/5.0', '-o', str(fpath), dl_url], check=False)
              
              if fpath.exists() and fpath.stat().st_size > 0:
                  sz_mb = fpath.stat().st_size / 1e6
                  print(f'   ✅ {sz_mb:.1f}MB')
                  
                  # فشرده‌سازی
                  video_exts = ['mp4', 'mkv', 'webm', 'avi', 'mov', 'm4v']
                  if any(fpath.name.lower().endswith(ext) for ext in video_exts) and video_quality != 'best':
                      tmp = fpath.with_name(f'comp_{fpath.name}')
                      print(f'   🔄 فشرده‌سازی به {video_quality}p...')
                      subprocess.run([
                          'ffmpeg', '-i', str(fpath),
                          '-vf', f'scale=-2:{video_quality}',
                          '-c:v', 'libx264', '-crf', '23',
                          '-c:a', 'aac', '-b:a', '128k',
                          '-y', str(tmp)
                      ], check=False, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                      if tmp.exists():
                          fpath.unlink()
                          shutil.move(str(tmp), str(fpath))
                          print(f'   📉 {fpath.stat().st_size/1e6:.1f}MB')
                  
                  # تیکه‌تکه
                  if split_mb > 0 and sz_mb > split_mb:
                      print(f'   ✂️ تیکه...')
                      subprocess.run(['zip', '-j', '-s', f'{split_mb}m', str(fpath) + '.zip', str(fpath)])
                      if list(fpath.parent.glob(f'{fpath.stem}.z*')):
                          fpath.unlink()
                  
                  # حذف از Seedr
                  print('🗑️ حذف از Seedr...')
                  seedr.deleteFile(file_info['id'])
                  print('✅ تموم شد!')

          PYEOF

      - name: 📤 آپلود
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p downloads searches
          git add downloads/ searches/ 2>/dev/null
          git diff --cached --quiet && exit 0
          git commit -m "📦 ${QUERY:0:50}" --quiet
          for i in 1 2 3; do git pull --rebase --quiet && git push --quiet && exit 0; sleep 3; doner / name
                      
                      # خوندن فایل از تورنت
                      with open(str(filepath), 'wb') as out_f:
                          piece_size = torinfo.piece_length()
                          total_size = f.size
                          offset = 0
                          while offset < total_size:
                              chunk_size = min(1024*1024, total_size - offset)  # 1MB chunks
                              data = handle.read_piece(offset // piece_size)
                              if data:
                                  piece_offset = offset % piece_size
                                  if piece_offset + chunk_size <= len(data):
                                      out_f.write(data[piece_offset:piece_offset+chunk_size])
                              offset += chunk_size
                      
                      if filepath.exists() and filepath.stat().st_size > 0:
                          size_mb = filepath.stat().st_size / 1e6
                          print(f'✅ {name} ({size_mb:.1f}MB)')
                          
                          # فشرده‌سازی ویدیو اگه خواسته بود
                          is_video = any(name.lower().endswith(ext) for ext in video_exts)
                          if is_video and video_quality != 'best':
                              compressed_path = out_dir / f'compressed_{name}'
                              filepath = compress_video(filepath, compressed_path, video_quality)
                              size_mb = filepath.stat().st_size / 1e6
                              print(f'   📉 بعد از فشرده‌سازی: {size_mb:.1f}MB')
                          
                          # تیکه‌تکه کردن
                          if split_mb > 0 and size_mb > split_mb:
                              print(f'   ✂️ تیکه‌تکه...')
                              subprocess.run([
                                  'zip', '-j', '-s', f'{split_mb}m',
                                  str(filepath) + '.zip', str(filepath)
                              ], check=False)
                              if list(filepath.parent.glob(f'{filepath.stem}.z*')):
                                  filepath.unlink()
                  
                  ses.remove_torrent(handle)
                  print('\n🎉 همه چی تموم شد!')
                  
              except ImportError:
                  print('❌ کتابخونه libtorrent نصب نیست. درحال نصب...')
                  subprocess.run(['pip3', 'install', 'python-libtorrent'], check=False)
                  print('🔄 لطفاً دوباره اجرا کن.')
                  sys.exit(1)
          PYEOF

      - name: 📤 آپلود
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p downloads searches
          git add downloads/ searches/ 2>/dev/null
          git diff --cached --quiet && exit 0
          git commit -m "📦 ${QUERY:0:50}" --quiet
          for i in 1 2 3; do git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null && exit 0; sleep 3; done
