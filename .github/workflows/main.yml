name: 🌐 Omni-Sniffer

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🎯 حالت حمله'
        required: true
        type: choice
        options:
          - torrent (جستجوی تورنت)
          - media (شکار و دانلود ویدیو و فایل از صفحه)
        default: 'media (شکار و دانلود ویدیو و فایل از صفحه)'
      query:
        description: '🔍 (جستجو) عبارت | (دانلود) لینک صفحه'
        required: true
        type: string
      max_items:
        description: '🔢 حداکثر نتایج/دانلود'
        required: false
        type: number
        default: 10
      split_mb:
        description: '📦 تیکه کردن > مگابایت (0=نه)'
        required: false
        type: number
        default: 0

env:
  PYTHONUNBUFFERED: '1'

jobs:
  omni-job:
    name: ⚡️ Omni Job
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🛠️ نصب مهمات
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip curl python3-pip
          pip3 install -q requests beautifulsoup4 yt-dlp

      - name: 🎯 اجرای عملیات
        env:
          MODE: ${{ github.event.inputs.mode }}
          QUERY: ${{ github.event.inputs.query }}
          MAX: ${{ github.event.inputs.max_items }}
          SPLIT_MB: ${{ github.event.inputs.split_mb }}
        run: |
          python3 << 'PYEOF'
          import os, re, sys, subprocess, requests, json
          from datetime import datetime
          from pathlib import Path
          from urllib.parse import quote_plus, urljoin
          from bs4 import BeautifulSoup

          mode = os.environ['MODE']
          query = os.environ['QUERY'].strip()
          max_items = int(os.environ.get('MAX', 10))
          split_mb = int(os.environ.get('SPLIT_MB', 0))

          H = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          # ============================================
          #   مود ۱: جستجوی تورنت (Torrentz2)
          # ============================================
          if 'torrent' in mode:
              print(f'🧲 جستجوی تورنت برای: {query}')
              try:
                  resp = requests.get(f'https://torrentz2.nz/search?q={quote_plus(query)}', headers=H, timeout=15)
                  if resp.status_code == 200:
                      soup = BeautifulSoup(resp.text, 'html.parser')
                      results = []
                      for item in soup.select('dl dt')[:max_items]:
                          a = item.select_one('a')
                          if a:
                              results.append({
                                  'title': a.get_text(strip=True)[:80],
                                  'url': 'https://torrentz2.nz' + a.get('href', ''),
                                  'info': item.select_one('span').get_text(strip=True) if item.select_one('span') else ''
                              })
                      
                      if results:
                          ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
                          qs = re.sub(r'[^\w]', '_', query)[:30]
                          Path('searches').mkdir(exist_ok=True)
                          f = Path(f'searches/{qs}_{ts}.md')
                          md = f'# 🧲 {query}\n\n'
                          md += '| # | Title | Info | Link |\n|---|-------|------|------|\n'
                          for i, r in enumerate(results, 1):
                              md += f'| {i} | {r["title"]} | {r["info"]} | [Link]({r["url"]}) |\n'
                          f.write_text(md)
                          print(f'✅ گزارش ذخیره شد: {f}')
                      else:
                          print('😞 هیچی پیدا نشد.')
                  else:
                      print(f'⚠️ خطای HTTP: {resp.status_code}')
              except Exception as e:
                  print(f'❌ خطا: {e}')

          # ============================================
          #   مود ۲: شکار مدیا و فایل از صفحه
          # ============================================
          elif 'media' in mode:
              url = query
              if not url.startswith('http'):
                  url = 'https://' + url
              
              print(f'🕷️ بررسی صفحه: {url}')
              
              try:
                  resp = requests.get(url, headers=H, timeout=15, allow_redirects=True)
                  if resp.status_code != 200:
                      print(f'❌ خطای HTTP: {resp.status_code}')
                      sys.exit(1)
                  
                  soup = BeautifulSoup(resp.text, 'html.parser')
                  base_url = resp.url
                  download_links = set()

                  # --- شکار ویدیوهای Embedded ---
                  print('🎬 جستجوی ویدیوهای مخفی...')
                  
                  # ۱. تگ <video> و <source>
                  for tag in soup.find_all(['video', 'source']):
                      src = tag.get('src', '')
                      if src and not src.startswith('data:'):
                          download_links.add(urljoin(base_url, src))
                  
                  # ۲. iframe ها (همهشون!)
                  for iframe in soup.find_all('iframe'):
                      src = iframe.get('src', '')
                      if src:
                          full_src = urljoin(base_url, src)
                          print(f'   📺 بررسی iframe: {full_src[:100]}...')
                          try:
                              # سعی کن وارد iframe بشه و اونجا هم بگرده
                              iframe_resp = requests.get(full_src, headers=H, timeout=10)
                              if iframe_resp.status_code == 200:
                                  iframe_soup = BeautifulSoup(iframe_resp.text, 'html.parser')
                                  for tag in iframe_soup.find_all(['video', 'source']):
                                      src2 = tag.get('src', '')
                                      if src2 and not src2.startswith('data:'):
                                          download_links.add(urljoin(full_src, src2))
                                  # شکار لینک mp4/m3u8 از کل متن iframe
                                  found = re.findall(r'https?://[^\s"\']+\.(?:mp4|webm|mkv|m3u8|ts)[^\s"\']*', iframe_resp.text)
                                  for f in found:
                                      download_links.add(f)
                          except:
                              pass
                  
                  # ۳. لینک‌های مستقیم مدیا در کل صفحه
                  print('🔗 جستجوی لینک‌های مدیا...')
                  media_exts = ['mp4', 'webm', 'mkv', 'm3u8', 'mp3', 'm4a', 'avi', 'mov', 'flv', 'wmv']
                  for tag in soup.find_all(['a', 'link']):
                      href = tag.get('href', '')
                      if href:
                          full_url = urljoin(base_url, href)
                          if any(full_url.lower().endswith(f'.{ext}') for ext in media_exts):
                              download_links.add(full_url)
                  
                  # ۴. لینک‌های mp4 در متن (regex)
                  found_in_text = re.findall(r'https?://[^\s"\'<>]+\.(?:mp4|webm|mkv|m3u8|mp3)[^\s"\'<>]*', resp.text)
                  for f in found_in_text:
                      if len(f) < 500:
                          download_links.add(f)

                  # --- شکار فایل‌های دیگه ---
                  print('📁 جستجوی فایل‌های قابل دانلود...')
                  file_exts = ['zip', 'rar', '7z', 'exe', 'pdf', 'iso', 'torrent', 'apk', 'dmg', 'deb', 'rpm', 'tar.gz', 'tar.xz', 'tar.bz2']
                  for tag in soup.find_all('a'):
                      href = tag.get('href', '')
                      if href:
                          full_url = urljoin(base_url, href)
                          if any(full_url.lower().endswith(f'.{ext}') or f'.{ext}?' in full_url.lower() for ext in file_exts):
                              download_links.add(full_url)

                  download_links = list(download_links)[:max_items]
                  
                  if not download_links:
                      print('😞 هیچ فایل یا ویدیویی پیدا نشد.')
                      sys.exit(0)

                  print(f'\n🎯 {len(download_links)} آیتم برای دانلود پیدا شد!\n{"="*50}')

                  # --- دانلود همه ---
                  out_dir = Path('downloads') / datetime.now().strftime('%Y%m%d_%H%M%S')
                  out_dir.mkdir(parents=True, exist_ok=True)
                  
                  for i, link in enumerate(download_links, 1):
                      print(f'\n📥 [{i}/{len(download_links)}] {link[:100]}...')
                      filename = link.split('/')[-1].split('?')[0] or f'file_{i}'
                      filepath = out_dir / filename
                      
                      try:
                          # استفاده از aria2 برای سرعت بالا
                          subprocess.run([
                              'aria2c', '-x4', '-s4', '--max-tries=3', '--timeout=60',
                              '--dir=' + str(out_dir), '--out=' + filename,
                              '--check-certificate=false', '--allow-overwrite=true', link
                          ], check=False)
                          
                          if filepath.exists() and filepath.stat().st_size > 0:
                              size = filepath.stat().st_size / 1e6
                              print(f'   ✅ دانلود شد: {size:.1f}MB')
                              
                              # تیکه‌تکه کردن اگه خواسته بود
                              if split_mb > 0 and size > split_mb:
                                  print(f'   ✂️ تیکه‌تکه کردن...')
                                  subprocess.run([
                                      'zip', '-j', '-s', f'{split_mb}m',
                                      str(filepath) + '.zip', str(filepath)
                                  ], check=False)
                                  filepath.unlink()  # حذف فایل اصلی
                          else:
                              print('   ❌ دانلود ناموفق یا فایل خالی')
                      except Exception as e:
                          print(f'   ❌ خطا: {e}')

                  print(f'\n{"="*50}')
                  print(f'✅ همه فایل‌ها در پوشه {out_dir} ذخیره شدند!')
                  
              except Exception as e:
                  print(f'❌ خطا: {e}')
                  sys.exit(1)
          
          PYEOF

      - name: 📤 آپلود به گیت‌هاب
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          
          echo "📦 آماده‌سازی برای آپلود..."
          mkdir -p downloads searches
          git add downloads/ searches/
          
          TOTAL=$(git diff --cached --name-only | wc -l)
          if [ "$TOTAL" -eq 0 ]; then
            echo "😴 چیزی برای آپلود نیست."
            exit 0
          fi
          
          echo "   📊 فایل‌های تغییر کرده: $TOTAL"
          git diff --cached --name-only | while read f; do echo "      📎 $f"; done
          
          git commit -m "📦 عملیات [${MODE}]: $QUERY [skip ci]" --quiet
          
          for i in 1 2 3 4 5; do
            echo -n "   🚀 تلاش $i..."
            if git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null; then
              echo " ✅ پایان ماموریت!"
              exit 0
            fi
            echo " ❌"
            git rebase --abort 2>/dev/null || true
            [ $i -lt 5 ] && sleep $((i*5))
          done
          echo "💀 آپلود ناموفق"
          exit 1
