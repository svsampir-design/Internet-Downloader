                          print(f'✅ {name} ({size_mb:.1f}MB)')
                          
                          # فشرده‌سازی ویدیو اگه خواسته بود
                          is_video = any(name.lower().endswith(ext) for ext in video_exts)
                          if is_video and video_quality != 'best':
                              compressed_path = out_dir / f'compressed_{name}'
                              filepath = compress_video(filepath, compressed_path, video_quality)
                              size_mb = filepath.stat().st_size / 1e6
                              print(f'   📉 بعد از فشرده‌سازی: {size_mb:.1f}MB')
                          
                          # تیکه‌تکه کردن
                          if split_mb > 0 and size_mb > split_mb:
                              print(f'   ✂️ تیکه‌تکه...')
                              subprocess.run([
                                  'zip', '-j', '-s', f'{split_mb}m',
                                  str(filepath) + '.zip', str(filepath)
                              ], check=False)
                              if list(filepath.parent.glob(f'{filepath.stem}.z*')):
                                  filepath.unlink()
                  
                  ses.remove_torrent(handle)
                  print('\n🎉 همه چی تموم شد!')
                  
              except ImportError:
                  print('❌ کتابخونه libtorrent نصب نیست. درحال نصب...')
                  subprocess.run(['pip3', 'install', 'python-libtorrent'], check=False)
                  print('🔄 لطفاً دوباره اجرا کن.')
                  sys.exit(1)
          PYEOF

      - name: 📤 آپلود
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p downloads searches
          git add downloads/ searches/ 2>/dev/null
          git diff --cached --quiet && exit 0
