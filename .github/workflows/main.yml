name: 🧲 Torrent Direct

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🎯 حالت'
        required: true
        type: choice
        options:
          - search (جستجو)
          - download (دانلود)
        default: 'download (دانلود)'
      query:
        description: '🔍 عبارت | 🧲 مگنت | 🌐 لینک'
        required: true
        type: string
      max_items:
        description: '🔢 حداکثر'
        required: false
        type: number
        default: 3
      split_mb:
        description: '📦 تکه > MB'
        required: false
        type: number
        default: 70

jobs:
  torrent:
    name: ⚡️ دانلود مستقیم
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ نصب
        run: |
          sudo apt-get update -qq 2>/dev/null || true
          sudo apt-get install -y -qq curl zip python3-pip 2>/dev/null || true
          # دانلود aria2c از سورس (نسخه جدیدتر)
          wget -q https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-linux-gnu-64bit.tar.xz
          tar -xf aria2-1.37.0-linux-gnu-64bit.tar.xz
          sudo cp aria2-1.37.0-linux-gnu-64bit/aria2c /usr/local/bin/
          pip3 install -q requests beautifulsoup4 2>/dev/null
          echo "✅ آماده!"

      - name: 🎯 اجرا
        env:
          MODE: ${{ github.event.inputs.mode }}
          QUERY: ${{ github.event.inputs.query }}
          MAX: ${{ github.event.inputs.max_items }}
          SPLIT_MB: ${{ github.event.inputs.split_mb }}
        run: |
          python3 << 'PYEOF'
          import os, re, sys, subprocess, shutil
          from pathlib import Path
          from datetime import datetime
          from urllib.parse import quote_plus
          import requests
          from bs4 import BeautifulSoup

          mode = os.environ['MODE']
          query = os.environ['QUERY'].strip()
          max_items = int(os.environ.get('MAX', 3))
          split_mb = int(os.environ.get('SPLIT_MB', 70))

          H = {'User-Agent': 'Mozilla/5.0'}

          # ===== SEARCH =====
          if 'search' in mode:
              print(f'🧲 جستجو: {query}')
              resp = requests.get(f'https://torrentz2.nz/search?q={quote_plus(query)}', headers=H, timeout=15)
              if resp.status_code == 200:
                  soup = BeautifulSoup(resp.text, 'html.parser')
                  results = []
                  for item in soup.select('dl dt')[:max_items]:
                      a = item.select_one('a'); info = item.select_one('span')
                      if a:
                          t = a.get_text(strip=True)[:80]
                          u = 'https://torrentz2.nz' + a.get('href', '')
                          infotxt = info.get_text(strip=True) if info else ''
                          sm = re.search(r'([\d.]+)\s*(GB|MB|KB)', infotxt, re.I)
                          sz = f'{sm.group(1)} {sm.group(2).upper()}' if sm else 'نامشخص'
                          results.append({'t':t,'u':u,'i':infotxt,'s':sz})
                  if results:
                      ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
                      qs = re.sub(r'[^\w]', '_', query)[:30]
                      Path('searches').mkdir(exist_ok=True)
                      f = Path(f'searches/{qs}_{ts}.md')
                      md = f'# 🧲 {query}\n\n| # | Title | Size | Info | Link |\n|---|-------|------|------|------|\n'
                      for i,r in enumerate(results,1):
                          md += f'| {i} | {r["t"][:50]} | {r["s"]} | {r["i"][:30]} | [Page]({r["u"]}) |\n'
                      f.write_text(md)
                      print(f'✅ {f}')
                  else: print('😞 هیچی')

          # ===== DOWNLOAD =====
          elif 'download' in mode:
              magnet = query if query.startswith('magnet:') else None
              
              if not magnet:
                  print(f'🕷️ استخراج از: {query}')
                  try:
                      resp = requests.get(query, headers=H, timeout=15, allow_redirects=True)
                      if resp.status_code == 200:
                          soup = BeautifulSoup(resp.text, 'html.parser')
                          mt = soup.select_one('a[href^="magnet:"]')
                          if mt: magnet = mt.get('href')
                          else:
                              m = re.search(r'magnet:\?xt=urn:btih:[a-fA-F0-9]{40}[^\s"\'<>]*', resp.text)
                              if m: magnet = m.group(0)
                              else:
                                  h = re.search(r'([a-fA-F0-9]{40})', resp.text)
                                  if h: magnet = f'magnet:?xt=urn:btih:{h.group(1).lower()}'
                  except: pass
              
              if not magnet:
                  print('❌ مگنت پیدا نشد')
                  sys.exit(1)
              
              print(f'🧲 {magnet[:60]}...')
              
              out_dir = Path('downloads') / datetime.now().strftime('%Y%m%d_%H%M%S')
              out_dir.mkdir(parents=True, exist_ok=True)
              
              # دانلود با aria2c فقط با DHT
              print('📥 شروع دانلود (فقط DHT)...')
              subprocess.run([
                  'aria2c',
                  '--bt-enable-lpd=true',          # Local Peer Discovery
                  '--bt-tracker-connect-timeout=5',
                  '--bt-tracker-timeout=5',
                  '--dht-entry-point=dht.transmissionbt.com:6881',
                  '--dht-file-path=/tmp/dht.dat',
                  '--enable-dht=true',
                  '--enable-dht6=false',
                  '--enable-peer-exchange=true',
                  '--follow-torrent=mem',
                  '--max-connection-per-server=16',
                  '--min-split-size=1M',
                  '--seed-time=0',
                  '--split=8',
                  '--bt-tracker='',                 # بدون tracker
                  '-d', str(out_dir),
                  magnet
              ], check=False)
              
              # پردازش فایل‌ها
              for f in out_dir.iterdir():
                  if f.is_file():
                      sz = f.stat().st_size / 1e6
                      print(f'✅ {f.name} ({sz:.1f}MB)')
                      
                      if split_mb > 0 and sz > split_mb:
                          print(f'   ✂️ تیکه...')
                          subprocess.run(['zip', '-j', '-s', f'{split_mb}m', str(f) + '.zip', str(f)])
                          if list(f.parent.glob(f'{f.stem}.z*')):
                              f.unlink()
          PYEOF

      - name: 📤 آپلود
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p downloads searches
          git add downloads/ searches/ 2>/dev/null
          git diff --cached --quiet && exit 0
          git commit -m "📦 ${QUERY:0:50}" --quiet
          for i in 1 2 3; do git pull --rebase --quiet && git push --quiet && exit 0; sleep 3; done_size > 0:
