name: 🧲 Torrent Pro Max

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🎯 حالت'
        required: true
        type: choice
        options:
          - search (جستجوی تورنت)
          - download (دانلود تورنت)
        default: 'download (دانلود تورنت)'
      query:
        description: '🔍 عبارت | 🧲 مگنت | 🌐 لینک صفحه'
        required: true
        type: string
      max_items:
        description: '🔢 حداکثر فایل'
        required: false
        type: number
        default: 3
      split_mb:
        description: '📦 تکه کردن > MB (0=نه)'
        required: false
        type: number
        default: 70

env:
  PYTHONUNBUFFERED: '1'

jobs:
  torrent-job:
    name: ⚡️ دانلود مستقیم تورنت
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ نصب ابزارها
        run: |
          sudo apt-get update -qq 2>/dev/null || true
          sudo apt-get install -y -qq curl zip python3-pip 2>/dev/null || true
          pip3 install -q requests beautifulsoup4 libtorrent 2>/dev/null || true
          echo "✅ آماده!"

      - name: 🎯 اجرای ماموریت
        env:
          MODE: ${{ github.event.inputs.mode }}
          QUERY: ${{ github.event.inputs.query }}
          MAX: ${{ github.event.inputs.max_items }}
          SPLIT_MB: ${{ github.event.inputs.split_mb }}
        run: |
          python3 << 'PYEOF'
          import os, re, sys, subprocess, hashlib
          from pathlib import Path
          from datetime import datetime
          from urllib.parse import quote_plus, urljoin
          import requests
          from bs4 import BeautifulSoup

          mode = os.environ['MODE']
          query = os.environ['QUERY'].strip()
          max_items = int(os.environ.get('MAX', 3))
          split_mb = int(os.environ.get('SPLIT_MB', 70))

          H = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          # =================================================================
          # ۱. جستجوی تورنت (Torrentz2)
          # =================================================================
          if mode == 'search (جستجوی تورنت)':
              print(f'🧲 جستجو: {query}')
              resp = requests.get(f'https://torrentz2.nz/search?q={quote_plus(query)}', headers=H, timeout=15)
              if resp.status_code == 200:
                  soup = BeautifulSoup(resp.text, 'html.parser')
                  results = []
                  for item in soup.select('dl dt')[:max_items]:
                      a = item.select_one('a')
                      info = item.select_one('span')
                      if a:
                          results.append({
                              'title': a.get_text(strip=True)[:80],
                              'url': 'https://torrentz2.nz' + a.get('href', ''),
                              'info': info.get_text(strip=True) if info else ''
                          })
                  if results:
                      ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
                      qs = re.sub(r'[^\w]', '_', query)[:30]
                      Path('searches').mkdir(exist_ok=True)
                      f = Path(f'searches/{qs}_{ts}.md')
                      md = f'# 🧲 {query}\n\n| # | Title | Info | Link |\n|---|-------|------|------|\n'
                      for i, r in enumerate(results, 1):
                          md += f'| {i} | {r["title"]} | {r["info"]} | [Page]({r["url"]}) |\n'
                      f.write_text(md)
                      print(f'✅ {f}')
                  else:
                      print('😞 هیچی پیدا نشد')

          # =================================================================
          # ۲. دانلود تورنت (پردازش دستی با Python)
          # =================================================================
          elif mode == 'download (دانلود تورنت)':
              magnet_link = query if query.startswith('magnet:') else None
              
              if not magnet_link:
                  print(f'🕷️ استخراج مگنت از: {query}')
                  resp = requests.get(query, headers=H, timeout=15, allow_redirects=True)
                  if resp.status_code == 200:
                      soup = BeautifulSoup(resp.text, 'html.parser')
                      m_tag = soup.select_one('a[href^="magnet:"]')
                      if m_tag:
                          magnet_link = m_tag.get('href')
                      else:
                          found = re.findall(r'magnet:\?xt=urn:btih:[a-fA-F0-9]{40}[^\s"\'<>]*', resp.text)
                          if found:
                              magnet_link = found[0]
                  
                  if not magnet_link:
                      # یه بار دیگه با regex قوی‌تر
                      hash_match = re.search(r'([a-fA-F0-9]{40})', resp.text)
                      if hash_match:
                          magnet_link = f'magnet:?xt=urn:btih:{hash_match.group(1)}'
              
              if not magnet_link:
                  print('❌ لینک مگنت پیدا نشد. مطمئنی تو یه صفحه تورنت هستی؟')
                  sys.exit(1)
              
              print(f'🧲 {magnet_link[:60]}...')
              
              # --- پردازش با python-libtorrent ---
              try:
                  import libtorrent as lt
                  
                  ses = lt.session()
                  ses.listen_on(6881, 6891)
                  
                  params = lt.parse_magnet_uri(magnet_link)
                  params.save_path = '/tmp/dl_torrent'
                  handle = ses.add_torrent(params)
                  
                  print('⏳ در حال اتصال به تورنت و انتظار برای متادیتا...')
                  import time
                  timeout = 120  # ۲ دقیقه صبر کن
                  while not handle.has_metadata():
                      time.sleep(2)
                      timeout -= 2
                      if timeout <= 0:
                          print('❌ وقت تموم شد! تورنت خیلی خلوت یا قطعه.')
                          sys.exit(1)
                      s = handle.status()
                      print(f'   Peers: {s.num_peers} | Seeds: {s.num_seeds}', end='\r')
                  
                  print('\n✅ متادیتا دریافت شد. شروع دانلود...')
                  
                  out_dir = Path('downloads') / datetime.now().strftime('%Y%m%d_%H%M%S')
                  out_dir.mkdir(parents=True, exist_ok=True)
                  
                  # دانلود همه فایل‌ها
                  handle.set_sequential_download(True)
                  
                  while not handle.is_seed():
                      time.sleep(1)
                      s = handle.status()
                      print(f'\r📥 {s.progress * 100:.1f}% | ↓ {s.download_rate/1024:.0f} KB/s', end='')
                  
                  print('\n✅ دانلود کامل شد!')
                  
                  # ذخیره فایل‌ها
                  torinfo = handle.get_torrent_info()
                  files = torinfo.files()
                  for i_file in range(min(files.num_files(), max_items)):
                      f = files.file_at(i_file)
                      name = f.path.split('/')[-1]
                      filepath = out_dir / name
                      
                      file_data = bytearray(f.size)
                      offset = 0
                      for piece_idx in range(torinfo.num_pieces()):
                          piece_data = handle.read_piece(piece_idx)
                          if piece_data:
                              piece_start = piece_idx * torinfo.piece_length()
                              file_start = max(0, f.offset - piece_start)
                              file_end = min(len(piece_data), f.offset + f.size - piece_start)
                              if file_start < file_end:
                                  file_data[offset:offset+file_end-file_start] = piece_data[file_start:file_end]
                      
                      filepath.write_bytes(file_data)
                      size_mb = filepath.stat().st_size / 1e6
                      print(f'✅ {name} ({size_mb:.1f}MB)')
                      
                      if split_mb > 0 and size_mb > split_mb:
                          print(f'   ✂️ تکه‌تکه...')
                          subprocess.run(['zip', '-j', '-s', f'{split_mb}m', str(filepath) + '.zip', str(filepath)], check=False)
                          filepath.unlink()
                  
                  ses.remove_torrent(handle)
                  
              except ImportError:
                  print('❌ کتابخونه libtorrent نصب نشد! تلاش برای نصب...')
                  subprocess.run(['pip3', 'install', 'python-libtorrent'])
                  print('🔄 لطفاً یه بار دیگه اجرا کن.')
                  sys.exit(1)
          PYEOF

      - name: 📤 آپلود نهایی
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p downloads searches
          git add downloads/ searches/ 2>/dev/null
          git diff --cached --quiet && exit 0
          git commit -m "📦 دانلود ${QUERY:0:50}" --quiet
          for i in 1 2 3; do git pull --rebase --quiet && git push --quiet && exit 0; sleep 3; done
