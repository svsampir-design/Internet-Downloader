name: 🧲 Torrent Direct

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🎯 حالت'
        required: true
        type: choice
        options:
          - search (جستجوی تورنت)
          - download (دانلود تورنت)
        default: 'download (دانلود تورنت)'
      query:
        description: '🔍 عبارت | 🌐 لینک صفحه تورنت'
        required: true
        type: string
      max_items:
        description: '🔢 حداکثر فایل'
        required: false
        type: number
        default: 3
      split_mb:
        description: '📦 تکه کردن > MB (0=نه)'
        required: false
        type: number
        default: 70

jobs:
  torrent-job:
    name: ⚡️ دانلود مستقیم تورنت
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ نصب
        run: |
          sudo apt-get update -qq 2>/dev/null || true
          sudo apt-get install -y -qq curl zip python3-pip aria2 2>/dev/null || true
          pip3 install -q requests beautifulsoup4 2>/dev/null
          echo "✅ آماده!"

      - name: 🎯 اجرا
        env:
          MODE: ${{ github.event.inputs.mode }}
          QUERY: ${{ github.event.inputs.query }}
          MAX: ${{ github.event.inputs.max_items }}
          SPLIT_MB: ${{ github.event.inputs.split_mb }}
        run: |
          python3 << 'PYEOF'
          import os, re, sys, subprocess, shutil
          from pathlib import Path
          from datetime import datetime
          from urllib.parse import quote_plus
          import requests
          from bs4 import BeautifulSoup

          mode = os.environ['MODE']
          query = os.environ['QUERY'].strip()
          max_items = int(os.environ.get('MAX', 3))
          split_mb = int(os.environ.get('SPLIT_MB', 70))

          H = {'User-Agent': 'Mozilla/5.0'}

          # =================================================================
          #  جستجوی تورنت
          # =================================================================
          if mode == 'search (جستجوی تورنت)':
              print(f'🧲 جستجو: {query}')
              resp = requests.get(f'https://torrentz2.nz/search?q={quote_plus(query)}', headers=H, timeout=15)
              if resp.status_code == 200:
                  soup = BeautifulSoup(resp.text, 'html.parser')
                  results = []
                  for item in soup.select('dl dt')[:max_items]:
                      a = item.select_one('a')
                      info = item.select_one('span')
                      if a:
                          results.append({
                              'title': a.get_text(strip=True)[:80],
                              'url': 'https://torrentz2.nz' + a.get('href', ''),
                              'info': info.get_text(strip=True) if info else ''
                          })
                  if results:
                      ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
                      qs = re.sub(r'[^\w]', '_', query)[:30]
                      Path('searches').mkdir(exist_ok=True)
                      f = Path(f'searches/{qs}_{ts}.md')
                      md = f'# 🧲 {query}\n\n| # | Title | Info | Link |\n|---|-------|------|------|\n'
                      for i, r in enumerate(results, 1):
                          md += f'| {i} | {r["title"]} | {r["info"]} | [Page]({r["url"]}) |\n'
                      f.write_text(md)
                      print(f'✅ {f}')
                  else:
                      print('😞 هیچی پیدا نشد')

          # =================================================================
          #  دانلود تورنت (مستقیم با aria2c)
          # =================================================================
          elif mode == 'download (دانلود تورنت)':
              print(f'🕷️ استخراج از: {query}')
              
              # استخراج info_hash از صفحه یا مگنت
              info_hash = None
              magnet = None
              
              if query.startswith('magnet:'):
                  magnet = query
                  m = re.search(r'btih:([a-fA-F0-9]{40})', query)
                  if m:
                      info_hash = m.group(1).lower()
              else:
                  resp = requests.get(query, headers=H, timeout=15, allow_redirects=True)
                  if resp.status_code == 200:
                      soup = BeautifulSoup(resp.text, 'html.parser')
                      magnet_tag = soup.select_one('a[href^="magnet:"]')
                      if magnet_tag:
                          magnet = magnet_tag.get('href')
                      else:
                          found = re.findall(r'magnet:\?xt=urn:btih:[a-fA-F0-9]{40}[^\s"\'<>]*', resp.text)
                          if found:
                              magnet = found[0]
                      
                      if magnet:
                          m = re.search(r'btih:([a-fA-F0-9]{40})', magnet)
                          if m:
                              info_hash = m.group(1).lower()
                      
                      # اگه مگنت نبود، info_hash رو از صفحه بگیر
                      if not info_hash:
                          hash_match = re.search(r'([a-fA-F0-9]{40})', resp.text)
                          if hash_match:
                              info_hash = hash_match.group(1).lower()
              
              if not info_hash:
                  print('❌ نتونستم info_hash رو پیدا کنم')
                  sys.exit(1)
              
              print(f'✅ Info Hash: {info_hash}')
              
              # دانلود فایل تورنت
              torrent_url = f'https://itorrents.org/torrent/{info_hash}.torrent'
              torrent_path = Path('/tmp/') / f'{info_hash}.torrent'
              
              print(f'📥 دانلود فایل تورنت...')
              subprocess.run(['curl', '-L', '-o', str(torrent_path), torrent_url], check=False)
              
              if torrent_path.exists() and torrent_path.stat().st_size > 0:
                  print(f'✅ فایل تورنت دریافت شد')
                  
                  out_dir = Path('downloads') / datetime.now().strftime('%Y%m%d_%H%M%S')
                  out_dir.mkdir(parents=True, exist_ok=True)
                  
                  # دانلود با aria2c
                  print(f'🚀 شروع دانلود با aria2c...')
                  subprocess.run([
                      'aria2c',
                      '--seed-time=0',
                      '--max-connection-per-server=4',
                      '--split=4',
                      '--min-split-size=1M',
                      '--dir=' + str(out_dir),
                      str(torrent_path)
                  ], check=False)
                  
                  # پاک کردن فایل تورنت
                  torrent_path.unlink()
                  
                  # تیکه‌تکه کردن فایل‌ها
                  for f in out_dir.iterdir():
                      if f.is_file():
                          size_mb = f.stat().st_size / 1e6
                          print(f'✅ {f.name} ({size_mb:.1f}MB)')
                          if split_mb > 0 and size_mb > split_mb:
                              print(f'✂️ تیکه‌تکه...')
                              subprocess.run(['zip', '-j', '-s', f'{split_mb}m', str(f) + '.zip', str(f)], check=False)
                              f.unlink()
              else:
                  print('❌ نتونستم فایل تورنت رو دریافت کنم')
          PYEOF

      - name: 📤 آپلود
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p downloads searches
          git add downloads/ searches/ 2>/dev/null
          git diff --cached --quiet && exit 0
          git commit -m "📦 ${QUERY:0:50}" --quiet
          for i in 1 2 3; do git pull --rebase --quiet && git push --quiet && exit 0; sleep 3; done
