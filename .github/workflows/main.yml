name: 🌐 Omni-Sniffer Final

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🎯 حالت'
        required: true
        type: choice
        options:
          - torrent-search (جستجوی تورنت)
          - torrent-download (دانلود از لینک/مگنت)
          - media-hunter (شکار ویدیو از سایت)
        default: 'media-hunter (شکار ویدیو از سایت)'
      query:
        description: '🔍 عبارت | 🧲 مگنت | 🌐 لینک'
        required: true
        type: string
      video_quality:
        description: '🎬 کیفیت'
        required: false
        type: choice
        options: [best, 1080, 720, 480, 360]
        default: '480'
      max_items:
        description: '🔢 حداکثر'
        required: false
        type: number
        default: 3
      split_mb:
        description: '📦 تکه کردن > MB'
        required: false
        type: number
        default: 70

env:
  PYTHONUNBUFFERED: '1'
  WORKER_URL: 'https://script.google.com/macros/s/کد-اختصاصی-تو/exec'

jobs:
  omni-job:
    name: ⚡️ عملیات نهایی
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl zip python3-pip
          pip3 install -q requests beautifulsoup4 yt-dlp ffmpeg

      - name: 🎯 اجرا
        env:
          MODE: ${{ github.event.inputs.mode }}
          QUERY: ${{ github.event.inputs.query }}
          MAX: ${{ github.event.inputs.max_items }}
          SPLIT_MB: ${{ github.event.inputs.split_mb }}
          VIDEO_QUALITY: ${{ github.event.inputs.video_quality }}
        run: |
          python3 << 'PYEOF'
          import os, re, sys, subprocess, requests
          from datetime import datetime
          from pathlib import Path
          from urllib.parse import quote_plus, urljoin
          from bs4 import BeautifulSoup

          mode = os.environ['MODE']
          query = os.environ['QUERY'].strip()
          max_items = int(os.environ.get('MAX', 3))
          split_mb = int(os.environ.get('SPLIT_MB', 70))
          video_quality = os.environ.get('VIDEO_QUALITY', '480')
          WORKER_URL = os.environ.get('WORKER_URL', '')

          H = {'User-Agent': 'Mozilla/5.0'}

          # =================================================================
          #  ۱. جستجوی تورنت (بدون تغییر)
          # =================================================================
          if 'search' in mode:
              print(f'🧲 جستجو: {query}')
              resp = requests.get(f'https://torrentz2.nz/search?q={quote_plus(query)}', headers=H, timeout=15)
              if resp.status_code == 200:
                  soup = BeautifulSoup(resp.text, 'html.parser')
                  results = []
                  for item in soup.select('dl dt')[:max_items]:
                      a = item.select_one('a')
                      info = item.select_one('span')
                      if a:
                          results.append({
                              'title': a.get_text(strip=True)[:80],
                              'url': 'https://torrentz2.nz' + a.get('href', ''),
                              'info': info.get_text(strip=True) if info else ''
                          })
                  if results:
                      ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
                      qs = re.sub(r'[^\w]', '_', query)[:30]
                      Path('searches').mkdir(exist_ok=True)
                      f = Path(f'searches/{qs}_{ts}.md')
                      md = f'# 🧲 {query}\n\n| # | Title | Info | Link |\n|---|-------|------|------|\n'
                      for i, r in enumerate(results, 1):
                          md += f'| {i} | {r["title"]} | {r["info"]} | [Page]({r["url"]}) |\n'
                      f.write_text(md)
                      print(f'✅ گزارش: {f}')
                  else:
                      print('😞 هیچی پیدا نشد')
              else:
                  print(f'⚠️ {resp.status_code}')

          # =================================================================
          #  ۲. دانلود تورنت (با Worker - بدون تغییر)
          # =================================================================
          elif 'download' in mode:
              # مشابه کد قبلی...
              print("برای دانلود تورنت نیاز به WORKER_URL داری که هنوز ساخته نشده.")
              print("لطفاً اول Google Apps Script یا Cloudflare Worker رو بساز و آدرس رو تو env بذار.")
              sys.exit(0)

          # =================================================================
          #  ۳. شکار ویدیو از وب‌سایت (حالا با کلی هوش!)
          # =================================================================
          elif 'hunter' in mode or 'media' in mode:
              url = query if query.startswith('http') else f'https://{query}'
              print(f'🕷️ شکار از: {url}')
              
              out_dir = Path('downloads') / datetime.now().strftime('%Y%m%d_%H%M%S')
              out_dir.mkdir(parents=True, exist_ok=True)
              
              # لیست کیفیت‌ها برای امتحان کردن به ترتیب اولویت (از بالا به پایین)
              quality_order = ['best', '1080', '720', '480', '360']
              start_index = quality_order.index(video_quality) if video_quality in quality_order else 3  # پیش‌فرض 480
              
              downloaded = False
              
              for q in quality_order[start_index:]:
                  if q == 'best':
                      fmt = 'bestvideo+bestaudio/best'
                  else:
                      # انتخاب بهترین با ارتفاع ≤ کیفیت
                      fmt = f'bestvideo[height<={q}]+bestaudio/best[height<={q}]'
                  
                  print(f'🎯 تلاش با کیفیت ≤ {q}...')
                  result = subprocess.run([
                      'yt-dlp',
                      '-f', fmt,
                      '-o', str(out_dir / '%(title)s.%(ext)s'),
                      '--merge-output-format', 'mp4',
                      '--user-agent', H['User-Agent'],
                      '--max-downloads', str(max_items),
                      '--no-warnings',
                      url
                  ], check=False)
                  
                  if result.returncode == 0:
                      # ببینم فایلی هست؟
                      videos = list(out_dir.glob('*.mp4')) + list(out_dir.glob('*.mkv')) + list(out_dir.glob('*.webm'))
                      if videos:
                          print(f'✅ ویدیو دانلود شد با کیفیت ≤ {q}')
                          for v in videos:
                              size_mb = v.stat().st_size / 1e6
                              print(f'   📁 {v.name} ({size_mb:.1f}MB)')
                              if split_mb > 0 and size_mb > split_mb:
                                  print(f'   ✂️ تیکه‌تکه کردن...')
                                  subprocess.run(['zip', '-j', '-s', f'{split_mb}m', str(v) + '.zip', str(v)], check=False)
                                  v.unlink()
                          downloaded = True
                          break
                  else:
                      print(f'   ⚠️ کیفیت {q} در دسترس نیست، میرم سراغ گزینه بعدی...')
              
              if not downloaded:
                  print('😞 نتونستم با هیچ کیفیتی دانلود کنم. شاید سایت ضد ربات باشه.')
              else:
                  # فایل‌های غیر ویدیویی هم اگه باشن
                  print('📁 جستجوی فایل‌های دیگه...')
                  try:
                      resp = requests.get(url, headers=H, timeout=15, allow_redirects=True)
                      if resp.status_code == 200:
                          soup = BeautifulSoup(resp.text, 'html.parser')
                          for tag in soup.find_all('a'):
                              href = tag.get('href', '')
                              if href:
                                  full_url = urljoin(resp.url, href)
                                  if any(full_url.lower().endswith(f'.{ext}') for ext in ['zip','rar','7z','exe','pdf','iso','apk']):
                                      name = full_url.split('/')[-1].split('?')[0]
                                      subprocess.run(['curl', '-L', '-A', H['User-Agent'], '-o', str(out_dir / name), full_url], check=False)
                  except: pass

          PYEOF

      - name: 📤 آپلود
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p downloads searches
          git add downloads/ searches/ 2>/dev/null
          git diff --cached --quiet && exit 0
          git commit -m "📦 [${MODE}] ${QUERY:0:50}" --quiet
          for i in 1 2 3; do
            git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null && exit 0
            sleep 3
          done
