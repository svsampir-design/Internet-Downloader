name: 🌐 Omni-Sniffer v2

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🎯 حالت حمله'
        required: true
        type: choice
        options:
          - torrent (جستجوی تورنت)
          - media (شکار ویدیو و فایل + کیفیت)
        default: 'media (شکار ویدیو و فایل + کیفیت)'
      query:
        description: '🔍 (جستجو) عبارت | (دانلود) لینک صفحه'
        required: true
        type: string
      video_quality:
        description: '🎬 حداکثر کیفیت برای ویدیوها'
        required: false
        type: choice
        options:
          - best (بهترین)
          - 1080
          - 720
          - 480
          - 360
          - worst (کمترین)
        default: '480'
        # این ورودی فقط در مود media نمایش داده می‌شود
        # (در YAML نمی‌شود شرطی کرد، همه مودها نشون داده میشه ولی تو کد فقط استفاده میشه)
      max_items:
        description: '🔢 حداکثر نتایج یا تعداد ویدیو'
        required: false
        type: number
        default: 5
      split_mb:
        description: '📦 تیکه کردن > مگابایت (0=نه)'
        required: false
        type: number
        default: 0

env:
  PYTHONUNBUFFERED: '1'

jobs:
  omni-job:
    name: ⚡️ عملیات ویژه
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🛠️ نصب مهمات
        run: |
          echo "📦 نصب curl, zip, python3..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl zip python3-pip
          pip3 install -q requests beautifulsoup4 yt-dlp

      - name: 🎯 اجرای عملیات
        env:
          MODE: ${{ github.event.inputs.mode }}
          QUERY: ${{ github.event.inputs.query }}
          MAX: ${{ github.event.inputs.max_items }}
          SPLIT_MB: ${{ github.event.inputs.split_mb }}
          VIDEO_QUALITY: ${{ github.event.inputs.video_quality }}
        run: |
          python3 << 'PYEOF'
          import os, re, sys, subprocess, requests, json
          from datetime import datetime
          from pathlib import Path
          from urllib.parse import quote_plus, urljoin
          from bs4 import BeautifulSoup

          mode = os.environ['MODE']
          query = os.environ['QUERY'].strip()
          max_items = int(os.environ.get('MAX', 5))
          split_mb = int(os.environ.get('SPLIT_MB', 0))
          video_quality = os.environ.get('VIDEO_QUALITY', '480')

          H = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          # ترجمه کیفیت به فرمت yt-dlp
          quality_map = {
              'best (بهترین)': 'best',
              '1080': 'best[height<=1080]',
              '720': 'best[height<=720]',
              '480': 'best[height<=480]',
              '360': 'best[height<=360]',
              'worst (کمترین)': 'worst'
          }
          yt_format = quality_map.get(video_quality, 'best[height<=480]')

          # ============================================
          #   مود ۱: جستجوی تورنت (بدون تغییر)
          # ============================================
          if 'torrent' in mode:
              print(f'🧲 جستجوی تورنت برای: {query}')
              try:
                  resp = requests.get(f'https://torrentz2.nz/search?q={quote_plus(query)}', headers=H, timeout=15)
                  if resp.status_code == 200:
                      soup = BeautifulSoup(resp.text, 'html.parser')
                      results = []
                      for item in soup.select('dl dt')[:max_items]:
                          a = item.select_one('a')
                          if a:
                              results.append({
                                  'title': a.get_text(strip=True)[:80],
                                  'url': 'https://torrentz2.nz' + a.get('href', ''),
                                  'info': item.select_one('span').get_text(strip=True) if item.select_one('span') else ''
                              })
                      
                      if results:
                          ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
                          qs = re.sub(r'[^\w]', '_', query)[:30]
                          Path('searches').mkdir(exist_ok=True)
                          f = Path(f'searches/{qs}_{ts}.md')
                          md = f'# 🧲 {query}\n\n'
                          md += '| # | Title | Info | Link |\n|---|-------|------|------|\n'
                          for i, r in enumerate(results, 1):
                              md += f'| {i} | {r["title"]} | {r["info"]} | [Link]({r["url"]}) |\n'
                          f.write_text(md)
                          print(f'✅ گزارش ذخیره شد: {f}')
                      else:
                          print('😞 هیچی پیدا نشد.')
                  else:
                      print(f'⚠️ خطای HTTP: {resp.status_code}')
              except Exception as e:
                  print(f'❌ خطا: {e}')

          # ============================================
          #   مود ۲: شکار مدیا و فایل (حرفه‌ای با yt-dlp)
          # ============================================
          elif 'media' in mode:
              url = query
              if not url.startswith('http'):
                  url = 'https://' + url
              
              print(f'🕷️ بررسی صفحه: {url}')
              print(f'🎬 کیفیت ویدیو: {video_quality} (فرمت: {yt_format})')
              
              out_dir = Path('downloads') / datetime.now().strftime('%Y%m%d_%H%M%S')
              out_dir.mkdir(parents=True, exist_ok=True)
              downloaded_something = False

              # --- حمله اول: ویدیوها را با yt-dlp شکار کن ---
              print('\n🎥 شروع شکار ویدیوها با yt-dlp...')
              try:
                  # yt-dlp به صورت خودکار ویدیوهای embedded را پیدا و با بهترین کیفیت محدود دانلود می‌کند
                  cmd = [
                      'yt-dlp',
                      '--no-warnings',
                      '--format', yt_format,
                      '--output', str(out_dir / '%(title)s.%(ext)s'),
                      '--merge-output-format', 'mp4',
                      '--user-agent', H['User-Agent'],
                      '--max-downloads', str(max_items),
                      url
                  ]
                  print(f'   🚀 اجرا: {" ".join(cmd)}')
                  result = subprocess.run(cmd, check=False)
                  if result.returncode == 0:
                      downloaded_something = True
                      print('   ✅ ویدیوها با موفقیت دانلود شدند.')
                  else:
                      print('   ⚠️ yt-dlp با خطا مواجه شد یا ویدیویی پیدا نکرد.')
              except Exception as e:
                  print(f'   ❌ خطا در yt-dlp: {e}')

              # --- حمله دوم: فایل‌های غیر ویدیویی (zip, pdf...) را با curl دانلود کن ---
              print('\n📁 شکار فایل‌های غیر ویدیویی...')
              try:
                  resp = requests.get(url, headers=H, timeout=15, allow_redirects=True)
                  if resp.status_code == 200:
                      soup = BeautifulSoup(resp.text, 'html.parser')
                      base_url = resp.url
                      file_links = set()

                      # همه تگ‌های a با لینک به فایل‌های مشخص
                      file_exts = ['zip', 'rar', '7z', 'exe', 'pdf', 'iso', 'torrent', 'apk', 'dmg', 'deb', 'rpm', 'tar.gz', 'tar.xz', 'tar.bz2']
                      for tag in soup.find_all('a'):
                          href = tag.get('href', '')
                          if href:
                              full_url = urljoin(base_url, href)
                              if any(full_url.lower().endswith(f'.{ext}') or f'.{ext}?' in full_url.lower() for ext in file_exts):
                                  file_links.add(full_url)

                      file_links = list(file_links)[:max_items]
                      if file_links:
                          print(f'   🎯 {len(file_links)} فایل غیر ویدیویی پیدا شد.')
                          for i, link in enumerate(file_links, 1):
                              filename = link.split('/')[-1].split('?')[0] or f'file_{i}'
                              filepath = out_dir / filename
                              print(f'   📥 [{i}/{len(file_links)}] {filename}')
                              # curl با دنبال کردن ریدایرکت
                              ret = subprocess.run([
                                  'curl', '-L', '--retry', '3', '--connect-timeout', '30',
                                  '-A', H['User-Agent'], '-o', str(filepath), link
                              ], check=False)
                              if ret.returncode == 0 and filepath.exists() and filepath.stat().st_size > 0:
                                  size_mb = filepath.stat().st_size / 1e6
                                  print(f'      ✅ دانلود شد ({size_mb:.1f}MB)')
                                  downloaded_something = True
                                  # تیکه تیکه کردن در صورت نیاز
                                  if split_mb > 0 and size_mb > split_mb:
                                      print(f'      ✂️ تیکه‌تکه کردن...')
                                      subprocess.run([
                                          'zip', '-j', '-s', f'{split_mb}m',
                                          str(filepath) + '.zip', str(filepath)
                                      ], check=False)
                                      filepath.unlink()  # پاک کردن اصلی
                              else:
                                  print(f'      ❌ دانلود ناموفق')
                      else:
                          print('   ℹ️ هیچ فایل غیر ویدیویی پیدا نشد.')
                  else:
                      print(f'   ⚠️ خطای HTTP: {resp.status_code}')
              except Exception as e:
                  print(f'   ❌ خطا در جستجوی فایل‌ها: {e}')

              if not downloaded_something:
                  print('\n💀 هیچ چیزی دانلود نشد. احتمالاً صفحه امنیتی داره یا محتواش مخفی‌تر از این حرفاست.')
              else:
                  print(f'\n✅ همه آیتم‌های دانلود شده در پوشه {out_dir} ذخیره شدند!')

          PYEOF

      - name: 📤 آپلود نهایی
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          
          echo "📦 آماده‌سازی برای آپلود..."
          mkdir -p downloads searches
          # یه پوشه موقت برای فایل‌های تیکه‌شده و غیره
          git add downloads/ searches/
          
          TOTAL=$(git diff --cached --name-only | wc -l)
          if [ "$TOTAL" -eq 0 ]; then
            echo "😴 چیزی برای آپلود نیست."
            exit 0
          fi
          
          echo "   📊 فایل‌های تغییر کرده: $TOTAL"
          git diff --cached --name-only | while read f; do echo "      📎 $f"; done
          
          git commit -m "📦 عملیات [${MODE}]: $QUERY [skip ci]" --quiet
          
          for i in 1 2 3 4 5; do
            echo -n "   🚀 تلاش $i..."
            if git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null; then
              echo " ✅ پایان ماموریت!"
              exit 0
            fi
            echo " ❌"
            git rebase --abort 2>/dev/null || true
            [ $i -lt 5 ] && sleep $((i*5))
          done
          echo "💀 آپلود ناموفق - حجم زیاد یا قطعی نت"
          exit 1
