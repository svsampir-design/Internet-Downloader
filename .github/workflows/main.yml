name: 🧲 Torrent Fast

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🎯 حالت'
        required: true
        type: choice
        options:
          - search (جستجو)
          - download (دانلود)
        default: 'download (دانلود)'
      query:
        description: '🔍 عبارت | 🧲 مگنت | 🌐 لینک'
        required: true
        type: string
      max_items:
        description: '🔢 حداکثر'
        required: false
        type: number
        default: 3
      video_quality:
        description: '🎬 کیفیت (best=بدون تغییر)'
        required: false
        type: choice
        options: [best, 1080, 720, 480, 360]
        default: '480'
      split_mb:
        description: '📦 تکه > MB (0=نه)'
        required: false
        type: number
        default: 70

jobs:
  torrent:
    name: ⚡️ سریع و خشمگین
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ نصب
        run: |
          sudo apt-get update -qq 2>/dev/null || true
          sudo apt-get install -y -qq curl zip python3-pip aria2 2>/dev/null || true
          pip3 install -q requests beautifulsoup4 2>/dev/null
          echo "✅ آماده!"

      - name: 🎯 اجرا
        env:
          MODE: ${{ github.event.inputs.mode }}
          QUERY: ${{ github.event.inputs.query }}
          MAX: ${{ github.event.inputs.max_items }}
          SPLIT_MB: ${{ github.event.inputs.split_mb }}
          VIDEO_QUALITY: ${{ github.event.inputs.video_quality }}
        run: |
          python3 << 'PYEOF'
          import os, re, sys, subprocess, shutil
          from pathlib import Path
          from datetime import datetime
          from urllib.parse import quote_plus
          import requests
          from bs4 import BeautifulSoup

          mode = os.environ['MODE']
          query = os.environ['QUERY'].strip()
          max_items = int(os.environ.get('MAX', 3))
          split_mb = int(os.environ.get('SPLIT_MB', 70))
          video_quality = os.environ.get('VIDEO_QUALITY', '480')

          H = {'User-Agent': 'Mozilla/5.0'}

          # ===== جستجو =====
          if 'search' in mode:
              print(f'🧲 جستجو: {query}')
              resp = requests.get(f'https://torrentz2.nz/search?q={quote_plus(query)}', headers=H, timeout=15)
              if resp.status_code == 200:
                  soup = BeautifulSoup(resp.text, 'html.parser')
                  results = []
                  for item in soup.select('dl dt')[:max_items]:
                      a = item.select_one('a'); info = item.select_one('span')
                      if a:
                          t = a.get_text(strip=True)[:80]
                          u = 'https://torrentz2.nz' + a.get('href', '')
                          infotxt = info.get_text(strip=True) if info else ''
                          sm = re.search(r'([\d.]+)\s*(GB|MB|KB)', infotxt, re.I)
                          sz = f'{sm.group(1)} {sm.group(2).upper()}' if sm else 'نامشخص'
                          results.append({'t':t,'u':u,'i':infotxt,'s':sz})
                  if results:
                      ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
                      qs = re.sub(r'[^\w]', '_', query)[:30]
                      Path('searches').mkdir(exist_ok=True)
                      f = Path(f'searches/{qs}_{ts}.md')
                      md = f'# 🧲 {query}\n\n| # | Title | Size | Info | Link |\n|---|-------|------|------|------|\n'
                      for i,r in enumerate(results,1):
                          md += f'| {i} | {r["t"][:50]} | {r["s"]} | {r["i"][:30]} | [Page]({r["u"]}) |\n'
                      f.write_text(md)
                      print(f'✅ {f}')
                  else: print('😞 هیچی')

          # ===== دانلود =====
          elif 'download' in mode:
              # استخراج مگنت
              magnet = query if query.startswith('magnet:') else None
              if not magnet:
                  resp = requests.get(query, headers=H, timeout=15)
                  m = re.search(r'magnet:\?xt=urn:btih:[a-fA-F0-9]{40}[^\s"\'<>]*', resp.text)
                  if m: magnet = m.group(0)
                  else:
                      h = re.search(r'([a-fA-F0-9]{40})', resp.text)
                      if h: magnet = f'magnet:?xt=urn:btih:{h.group(1)}'
              
              if not magnet:
                  print('❌ مگنت پیدا نشد')
                  sys.exit(1)
              
              print(f'🧲 {magnet[:60]}...')
              ih = re.search(r'btih:([a-fA-F0-9]{40})', magnet).group(1).lower()
              
              # دانلود فایل تورنت
              turl = f'https://itorrents.org/torrent/{ih}.torrent'
              tpath = Path(f'/tmp/{ih}.torrent')
              subprocess.run(['curl', '-L', '-o', str(tpath), turl], check=False)
              
              if not tpath.exists() or tpath.stat().st_size < 100:
                  print('❌ فایل تورنت پیدا نشد')
                  sys.exit(1)
              
              # آنالیز فایل تورنت
              import bencodepy
              with open(tpath, 'rb') as f:
                  data = bencodepy.decode(f.read())
              
              info = data[b'info']
              files = info.get(b'files', [info])
              if b'files' not in info:
                  files = [info]
              
              out_dir = Path('downloads') / datetime.now().strftime('%Y%m%d_%H%M%S')
              out_dir.mkdir(parents=True, exist_ok=True)
              
              # چک کردن web seeds
              web_seeds = data.get(b'url-list', [])
              if not isinstance(web_seeds, list):
                  web_seeds = [web_seeds]
              
              downloaded = 0
              for f_entry in files[:max_items]:
                  if b'files' in info:
                      name = '/'.join([x.decode() for x in f_entry[b'path']])
                  else:
                      name = info[b'name'].decode()
                  
                  local_name = name.split('/')[-1]
                  fpath = out_dir / local_name
                  
                  # اگه web seed باشه، مستقیم دانلود
                  if web_seeds:
                      for ws in web_seeds:
                          if isinstance(ws, bytes):
                              ws = ws.decode()
                          durl = ws.rstrip('/') + '/' + name.replace(' ', '%20')
                          print(f'📥 Web Seed: {local_name}')
                          ret = subprocess.run(['curl', '-L', '--retry', '3', '-A', 'Mozilla/5.0', '-o', str(fpath), durl], check=False)
                          if ret.returncode == 0 and fpath.exists() and fpath.stat().st_size > 0:
                              print(f'   ✅ {fpath.stat().st_size/1e6:.1f}MB')
                              downloaded += 1
                              break
                  else:
                      # با aria2c
                      print(f'📥 aria2: {local_name}')
                      # ساخت یه تورنت تک فایلی
                      # (ساده‌سازی کردم - فقط خود فایل رو با hash چک نمی‌کنیم)
                      subprocess.run(['aria2c', '--seed-time=0', '-d', str(out_dir), str(tpath)], check=False)
              
              if downloaded == 0:
                  print('😞 هیچی دانلود نشد. تورنت web seed نداره و aria2 هم نتونست.')
              else:
                  # فشرده‌سازی
                  for f in out_dir.iterdir():
                      if f.suffix.lower() in ['.mp4','.mkv','.webm','.avi'] and video_quality != 'best':
                          tmp = out_dir / f'comp_{f.name}'
                          subprocess.run(['ffmpeg', '-i', str(f), '-vf', f'scale=-2:{video_quality}', '-c:v', 'libx264', '-crf', '23', '-c:a', 'aac', '-b:a', '128k', '-y', str(tmp)], check=False)
                          if tmp.exists():
                              f.unlink()
                              shutil.move(str(tmp), str(f))
          PYEOF

      - name: 📤 آپلود
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p downloads searches
          git add downloads/ searches/ 2>/dev/null
          git diff --cached --quiet && exit 0
          git commit -m "📦 ${QUERY:0:50}" --quiet
          for i in 1 2 3; do git pull --rebase --quiet && git push --quiet && exit 0; sleep 3; done                         shutil.move(str(f), str(dest))
                          sz = dest.stat().st_size / 1e6
                          print(f'✅ {dest.name} ({sz:.1f}MB)')
                          if split_mb > 0 and sz > split_mb:
                              print(f'   ✂️ تکه‌تکه...')
                              subprocess.run(['zip', '-j', '-s', f'{split_mb}m', str(dest) + '.zip', str(dest)])
                              if list(dest.parent.glob(f'{dest.stem}.z*')):
                                  dest.unlink()
              else:
                  print('❌ پوشه دانلود خالی است!')
          PYEOF

      - name: 📤 آپلود نهایی
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p downloads searches
          git add downloads/ searches/ 2>/dev/null
          git diff --cached --quiet && exit 0
          git commit -m "📦 ${QUERY:0:50}" --quiet
          for i in 1 2 3; do git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null && exit 0; sleep 3; done             if int(progress) != last_progress:
                          print(f'\r📥 {progress:.1f}% | ↓ {s.download_rate/1024:.0f} KB/s | ↑ {s.upload_rate/1024:.0f} KB/s | Peers: {s.num_peers}', end='')
                          last_progress = int(progress)
                  
                  print('\n✅ دانلود کامل شد! استخراج فایل‌ها...')
                  
                  torinfo = handle.get_torrent_info()
                  files = torinfo.files()
                  
                  video_exts = ['mp4', 'mkv', 'webm', 'avi', 'mov', 'm4v', 'ts']
                  
                  for i_file in range(min(files.num_files(), max_items)):
                      f = files.file_at(i_file)
                      name = f.path.split('/')[-1]
                      filepath = out_dir / name
                      
                      # خوندن فایل از تورنت
                      with open(str(filepath), 'wb') as out_f:
                          piece_size = torinfo.piece_length()
                          total_size = f.size
                          offset = 0
                          while offset < total_size:
                              chunk_size = min(1024*1024, total_size - offset)  # 1MB chunks
                              data = handle.read_piece(offset // piece_size)
                              if data:
                                  piece_offset = offset % piece_size
                                  if piece_offset + chunk_size <= len(data):
                                      out_f.write(data[piece_offset:piece_offset+chunk_size])
                              offset += chunk_size
                      
                      if filepath.exists() and filepath.stat().st_size > 0:
                          size_mb = filepath.stat().st_size / 1e6
                          print(f'✅ {name} ({size_mb:.1f}MB)')
                          
                          # فشرده‌سازی ویدیو اگه خواسته بود
                          is_video = any(name.lower().endswith(ext) for ext in video_exts)
                          if is_video and video_quality != 'best':
                              compressed_path = out_dir / f'compressed_{name}'
                              filepath = compress_video(filepath, compressed_path, video_quality)
                              size_mb = filepath.stat().st_size / 1e6
                              print(f'   📉 بعد از فشرده‌سازی: {size_mb:.1f}MB')
                          
                          # تیکه‌تکه کردن
                          if split_mb > 0 and size_mb > split_mb:
                              print(f'   ✂️ تیکه‌تکه...')
                              subprocess.run([
                                  'zip', '-j', '-s', f'{split_mb}m',
                                  str(filepath) + '.zip', str(filepath)
                              ], check=False)
                              if list(filepath.parent.glob(f'{filepath.stem}.z*')):
                                  filepath.unlink()
                  
                  ses.remove_torrent(handle)
                  print('\n🎉 همه چی تموم شد!')
                  
              except ImportError:
                  print('❌ کتابخونه libtorrent نصب نیست. درحال نصب...')
                  subprocess.run(['pip3', 'install', 'python-libtorrent'], check=False)
                  print('🔄 لطفاً دوباره اجرا کن.')
                  sys.exit(1)
          PYEOF

      - name: 📤 آپلود
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p downloads searches
          git add downloads/ searches/ 2>/dev/null
          git diff --cached --quiet && exit 0
          git commit -m "📦 ${QUERY:0:50}" --quiet
          for i in 1 2 3; do git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null && exit 0; sleep 3; done
