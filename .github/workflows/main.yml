name: 🌐 Internet Downloader

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🔄 Mode'
        required: true
        type: choice
        options:
          - search
          - download
        default: 'search'
      query:
        description: '🔍 Search query OR direct download URL'
        required: true
        type: string
      filetype:
        description: '📎 File type filter (e.g., mp4, zip, pdf) - only for search mode'
        required: false
        type: string
        default: ''
      max_results:
        description: '🔢 Max search results'
        required: false
        type: number
        default: 15
      split_threshold_mb:
        description: '📦 Split files > MB (0 = no split)'
        required: false
        type: number
        default: 50

env:
  PYTHONUNBUFFERED: '1'

jobs:
  internet-job:
    name: 🌍 Internet Job
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: ⚡ Setup tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip curl python3-pip
          pip3 install -q requests beautifulsoup4

      - name: 🔍 SEARCH MODE
        if: github.event.inputs.mode == 'search'
        env:
          QUERY: ${{ github.event.inputs.query }}
          FILETYPE: ${{ github.event.inputs.filetype }}
          MAX_RESULTS: ${{ github.event.inputs.max_results }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, requests, hashlib
          from bs4 import BeautifulSoup
          from datetime import datetime
          from pathlib import Path
          from urllib.parse import quote_plus

          query = os.environ['QUERY'].strip()
          filetype = os.environ['FILETYPE'].strip()
          max_results = int(os.environ.get('MAX_RESULTS', 15))

          # ساخت کوئری جستجو (اضافه کردن filetype اگر خواسته بود)
          search_q = query
          if filetype:
              search_q += f' filetype:{filetype}'

          print(f'🔍 Searching for: "{search_q}" (max {max_results} results)')

          # استفاده از DuckDuckGo Lite (صفحه ساده‌تر و قابل scrape)
          url = f'https://lite.duckduckgo.com/lite/'
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          }
          params = {'q': search_q, 's': 0, 'dc': max_results}

          results = []
          page = 0
          while len(results) < max_results and page < 3:
              params['s'] = page * 30
              try:
                  resp = requests.get(url, params=params, headers=headers, timeout=15)
                  soup = BeautifulSoup(resp.text, 'html.parser')
                  # لینک‌های نتایج در این کلاس‌ها هستند (برای lite)
                  for row in soup.select('tr.result-row'):
                      title_td = row.find('td', class_='result-snippet')
                      link_td = row.find('td', class_='result-link')
                      if not title_td or not link_td:
                          continue
                      title = title_td.get_text(strip=True)
                      link = link_td.get_text(strip=True)
                      # فیلتر کردن لینک‌های غیرمستقیم و تکراری
                      if not link.startswith('http'):
                          continue
                      # حذف لینک‌های خود duckduckgo
                      if 'duckduckgo.com' in link:
                          continue
                      # سعی می‌کنیم تشخیص بدیم لینک مستقیم به فایله یا نه
                      file_ext = re.search(r'\.(\w{2,4})$', link.split('?')[0])
                      is_direct = False
                      if file_ext:
                          is_direct = True
                      # حتی اگر مستقیم نباشه هم نمایش می‌دیم، ولی علامت می‌زنیم
                      results.append({
                          'title': title[:80],
                          'url': link,
                          'direct': is_direct,
                          'ext': file_ext.group(1) if file_ext else ''
                      })
                      if len(results) >= max_results:
                          break
                  page += 1
              except Exception as e:
                  print(f'   ⚠️ Error during search: {e}')
                  break

          # ذخیره در پوشه searches
          ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
          qs = re.sub(r'[^\w]', '_', query)[:30]
          search_dir = Path('searches')
          search_dir.mkdir(exist_ok=True)
          report_file = search_dir / f'{qs}_{ts}.md'

          md = f'# 🔍 Search: {query}\n\n'
          md += f'**Date:** {datetime.now():%Y-%m-%d %H:%M} | **Results:** {len(results)}\n\n'
          md += f'| # | Title | Link | Direct? | Type |\n'
          md += f'|---|-------|------|---------|------|\n'
          for i, r in enumerate(results, 1):
              direct_str = '✅' if r['direct'] else '❌'
              md += f'| {i} | {r["title"]} | [{r["url"][:60]}...]({r["url"]}) | {direct_str} | {r["ext"]} |\n'
          md += '\n---\n\n'
          md += '## 📄 Details\n\n'
          for i, r in enumerate(results, 1):
              md += f'### {i}. {r["title"]}\n\n'
              md += f'**URL:** {r["url"]}\n\n'
              md += f'**Direct File:** {direct_str}\n\n'
              if r['direct']:
                  md += f'**File Type:** .{r["ext"]}\n\n'
              md += '---\n\n'

          report_file.write_text(md)
          print(f'✅ Report saved: {report_file}')
          
          # ذخیره metadata برای commit message
          Path('/tmp/search_meta.json').write_text(json.dumps({
              'query': query, 'count': len(results)
          }))
          PYEOF

      - name: 📥 DOWNLOAD MODE
        if: github.event.inputs.mode == 'download'
        env:
          URL: ${{ github.event.inputs.query }}
          SPLIT_THRESHOLD_MB: ${{ github.event.inputs.split_threshold_mb }}
        run: |
          #!/bin/bash
          set -e
          URL="$URL"
          SPLIT_MB="${SPLIT_THRESHOLD_MB:-50}"
          WORK_DIR="$HOME/work"
          OUT_DIR="$HOME/out"
          mkdir -p "$WORK_DIR" "$OUT_DIR"

          # استخراج اسم فایل از URL
          FILENAME=$(basename "$URL" | sed 's/[?#].*//; s/%20/ /g')
          [ -z "$FILENAME" ] && FILENAME="download_$(date +%s)"

          echo "📥 Downloading: $FILENAME"
          
          # دانلود با aria2
          aria2c -x4 -s4 --max-tries=5 --retry-wait=10 --timeout=120 \
            --dir="$WORK_DIR" --out="$FILENAME" \
            --check-certificate=false --allow-overwrite=true "$URL" || {
            echo "🔄 Retrying with curl..."
            curl -L --retry 5 --retry-delay 10 -A "Mozilla/5.0" -o "$WORK_DIR/$FILENAME" "$URL"
          }

          if [ ! -f "$WORK_DIR/$FILENAME" ] || [ ! -s "$WORK_DIR/$FILENAME" ]; then
            echo "❌ Download failed or file empty"
            exit 1
          fi

          SIZE=$(du -h "$WORK_DIR/$FILENAME" | cut -f1)
          echo "✅ Downloaded: $SIZE"

          # زیپ کردن و تیکه‌تکه کردن
          NAME=$(echo "$FILENAME" | sed 's/\.[^.]*$//' | tr ' ' '_')
          FOLDER="$OUT_DIR/$NAME"
          mkdir -p "$FOLDER"
          echo "📦 Packing into $FOLDER"

          if [ "$SPLIT_MB" -gt 0 ] && [ $(stat -c%s "$WORK_DIR/$FILENAME") -gt $((SPLIT_MB * 1024 * 1024)) ]; then
            echo "✂️ Splitting into ${SPLIT_MB}MB parts..."
            zip -j -s ${SPLIT_MB}m "$FOLDER/$NAME.zip" "$WORK_DIR/$FILENAME"
          else
            zip -j "$FOLDER/$NAME.zip" "$WORK_DIR/$FILENAME"
          fi

          # ساخت یک README ساده
          echo "# $NAME" > "$FOLDER/README.md"
          echo "" >> "$FOLDER/README.md"
          echo "| # | File | Link |" >> "$FOLDER/README.md"
          echo "|---|------|------|" >> "$FOLDER/README.md"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          i=1
          for f in $(ls "$FOLDER" | grep -v README | sort); do
            ENC=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$f'))" 2>/dev/null || echo "$f")
            echo "| $i | $f | [Download](https://github.com/$REPO/raw/$BRANCH/downloads/$NAME/$ENC) |" >> "$FOLDER/README.md"
            i=$((i+1))
          done

          echo "OUT_DIR=$OUT_DIR" >> $GITHUB_ENV

      - name: 📤 Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          
          echo "📦 Preparing to push..."
          # اگر در مود search بود، فقط پوشه searches را اضافه کن
          if [ "${{ github.event.inputs.mode }}" = "search" ]; then
            mkdir -p searches
            # محتوای جستجو قبلاً ایجاد شده
            echo "🔍 Adding search results..."
          elif [ "${{ github.event.inputs.mode }}" = "download" ]; then
            mkdir -p downloads
            rm -rf downloads/*
            cp -r $OUT_DIR/* downloads/ 2>/dev/null || true
            echo "📥 Adding downloaded files..."
          fi

          git add -A
          
          TOTAL=$(git diff --cached --name-only | wc -l)
          echo "   Files to commit: $TOTAL"
          if [ $TOTAL -eq 0 ]; then
            echo "Nothing to push, exiting."
            exit 0
          fi
          
          git diff --cached --name-only | while read f; do echo "   📎 $f"; done
          
          # پیغام commit بستگی به مود
          MODE="${{ github.event.inputs.mode }}"
          QUERY="${{ github.event.inputs.query }}"
          if [ "$MODE" = "search" ]; then
            COMMIT_MSG="🔍 Search: ${QUERY:0:50} [skip ci]"
          else
            COMMIT_MSG="📥 Download: ${QUERY:0:50} [skip ci]"
          fi
          
          git commit -m "$COMMIT_MSG" --quiet
          
          for i in 1 2 3 4 5; do
            echo -n "   🚀 Push attempt $i/5..."
            if git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null; then
              echo " ✅ Done!"
              exit 0
            fi
            echo " ❌"
            git rebase --abort 2>/dev/null || true
            [ $i -lt 5 ] && sleep $((i*5))
          done
          echo "❌ Push failed"
          exit 1
