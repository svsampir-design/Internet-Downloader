name: 🌐 Super Searcher

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🎯 موتور جستجو'
        required: true
        type: choice
        options:
          - web (DuckDuckGo)
          - torrentz2 (Torrent Search)
        default: 'torrentz2 (Torrent Search)'
      query:
        description: '🔍 عبارت جستجو'
        required: true
        type: string
      max_results:
        description: '🔢 حداکثر نتایج'
        required: false
        type: number
        default: 15

env:
  PYTHONUNBUFFERED: '1'

jobs:
  search:
    name: ⚡️ جستجوی پیشرفته
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🛠️ نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip
          pip3 install -q requests beautifulsoup4

      - name: 🔎 اجرای جستجو
        env:
          MODE: ${{ github.event.inputs.mode }}
          QUERY: ${{ github.event.inputs.query }}
          MAX: ${{ github.event.inputs.max_results }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, requests, hashlib, sys
          from datetime import datetime
          from pathlib import Path
          from urllib.parse import quote_plus
          from bs4 import BeautifulSoup

          mode = os.environ['MODE']
          query = os.environ['QUERY'].strip()
          max_r = int(os.environ.get('MAX', 15))

          results = []
          engine_name = ""
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8',
              'Accept-Language': 'en-US,en;q=0.5',
              'Referer': 'https://www.google.com/',
              'DNT': '1'
          }

          # ─── ۱. جستجوی استاندارد وب ───
          if 'web' in mode or 'duckduckgo' in mode:
              engine_name = "DuckDuckGo (Web)"
              print(f'🌐 جستجوی وب: {query}')
              try:
                  # استفاده از نسخه HTML ساده DuckDuckGo
                  url = 'https://html.duckduckgo.com/html/'
                  params = {'q': query}
                  resp = requests.post(url, data=params, headers=headers, timeout=15)
                  if resp.status_code == 200:
                      soup = BeautifulSoup(resp.text, 'html.parser')
                      items = soup.select('.result')
                      for item in items[:max_r]:
                          title_elem = item.select_one('.result__title')
                          link_elem = item.select_one('.result__url')
                          snippet_elem = item.select_one('.result__snippet')
                          if title_elem and link_elem:
                              title = title_elem.get_text(strip=True)
                              raw_link = link_elem.get('href', '')
                              if 'uddg=' in raw_link:
                                  actual_link = raw_link.split('uddg=')[-1].split('&')[0]
                                  actual_link = requests.utils.unquote(actual_link)
                              else:
                                  actual_link = raw_link
                              snippet = snippet_elem.get_text(strip=True) if snippet_elem else ''
                              file_ext = re.search(r'\.(\w{2,4})$', actual_link.split('?')[0])
                              results.append({
                                  'title': title[:80],
                                  'url': actual_link,
                                  'info': snippet[:120],
                                  'direct': bool(file_ext),
                                  'ext': file_ext.group(1) if file_ext else ''
                              })
                  else:
                      print(f'   ⚠️ وضعیت HTTP: {resp.status_code}')
              except Exception as e:
                  print(f'   ⚠️ خطا: {e}')

          # ─── ۲. جستجوی تورنت (Torrentz2) ───
          elif 'torrent' in mode or 'torrentz' in mode:
              engine_name = "Torrentz2 (Torrents)"
              print(f'🧲 جستجوی تورنت: {query}')
              try:
                  # استفاده از torrentz2.nz (موتور جستجوی تورنت)
                  search_url = f'https://torrentz2.nz/search?q={quote_plus(query)}'
                  resp = requests.get(search_url, headers=headers, timeout=15)
                  
                  if resp.status_code == 200:
                      soup = BeautifulSoup(resp.text, 'html.parser')
                      items = soup.select('dl dt')
                      for item in items[:max_r]:
                          link_elem = item.select_one('a')
                          if link_elem:
                              title = link_elem.get_text(strip=True)
                              url = 'https://torrentz2.nz' + link_elem.get('href', '')
                              # گرفتن اطلاعات بیشتر (سایز، سید و...)
                              info_span = item.select_one('span')
                              info = info_span.get_text(strip=True) if info_span else ''
                              results.append({
                                  'title': title[:80],
                                  'url': url,
                                  'info': info[:120],
                                  'direct': False,
                                  'ext': 'torrent'
                              })
                  else:
                      print(f'   ⚠️ وضعیت HTTP: {resp.status_code}')
              except Exception as e:
                  print(f'   ⚠️ خطا: {e}')

          # ─── ذخیره نتایج ───
          if not results:
              print('😞 هیچ نتیجه‌ای پیدا نشد.')
              sys.exit(0)

          ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
          qs = re.sub(r'[^\w]', '_', query)[:30]
          search_dir = Path('searches')
          search_dir.mkdir(exist_ok=True)
          report_file = search_dir / f'{qs}_{ts}.md'

          md = f'# {engine_name}\n\n'
          md += f'**Query:** `{query}` | **Results:** {len(results)}\n\n'
          md += '| # | Title | Info | Link |\n'
          md += '|---|-------|------|------|\n'
          for i, r in enumerate(results, 1):
              title = r['title'].replace('|', '/')
              info = r.get('info', '').replace('|', '/')
              md += f'| {i} | {title} | {info} | [Link]({r["url"]}) |\n'

          md += '\n---\n\n## 📝 جزئیات کامل\n\n'
          for i, r in enumerate(results, 1):
              md += f'### {i}. {r["title"]}\n\n'
              md += f'**URL:** {r["url"]}\n\n'
              if r.get('direct'):
                  md += f'**⚠️ لینک مستقیم فایل:** بله (.{r.get("ext")})\n\n'
              md += f'**اطلاعات:** {r.get("info")}\n\n---\n\n'

          report_file.write_text(md)
          print(f'✅ گزارش نهایی: {report_file}')
          PYEOF

      - name: 📤 بارگذاری نتایج روی گیت‌هاب
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          
          echo "📦 آماده‌سازی برای آپلود..."
          mkdir -p searches
          git add searches/
          
          TOTAL=$(git diff --cached --name-only | wc -l)
          if [ "$TOTAL" -eq 0 ]; then
            echo "😴 چیز جدیدی برای آپلود نیست."
            exit 0
          fi
          
          echo "   📊 فایل‌های تغییر کرده: $TOTAL"
          git diff --cached --name-only | while read f; do echo "      📎 $f"; done
          
          QUERY="${{ github.event.inputs.query }}"
          MODE="${{ github.event.inputs.mode }}"
          git commit -m "🔍 جستجو [${MODE}]: ${QUERY:0:50} [skip ci]" --quiet
          
          for i in 1 2 3 4 5; do
            echo -n "   🚀 تلاش $i..."
            if git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null; then
              echo " ✅ پایان ماموریت!"
              exit 0
            fi
            echo " ❌"
            git rebase --abort 2>/dev/null || true
            [ $i -lt 5 ] && sleep $((i*5))
          done
          echo "💀 آپلود ناموفق - احتمالاً حجم بالا یا قطعی نت"
          exit 1
