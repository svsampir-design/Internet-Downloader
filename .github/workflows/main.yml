name: 🌐 Ultimate Scraper

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🎯 حالت'
        required: true
        type: choice
        options:
          - search (جستجوی وب)
          - scrape (دانلود و تبدیل ویدیو از صفحه)
        default: 'scrape (دانلود و تبدیل ویدیو از صفحه)'
      query:
        description: '🔍 عبارت جستجو | 🌐 لینک صفحه'
        required: true
        type: string
      video_quality:
        description: '🎬 حداکثر کیفیت (در صورت نیاز تبدیل)'
        required: false
        type: choice
        options: [best, 1080, 720, 480, 360]
        default: '480'
      max_items:
        description: '🔢 حداکثر نتایج/ویدیو'
        required: false
        type: number
        default: 3
      split_mb:
        description: '📦 تکه کردن > MB (0=نه)'
        required: false
        type: number
        default: 70

env:
  PYTHONUNBUFFERED: '1'

jobs:
  omni-job:
    name: ⚡️ اسکریپر و جستجو
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ نصب پیش‌نیازها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl zip python3-pip ffmpeg
          pip3 install -q requests beautifulsoup4 yt-dlp

      - name: 🎯 اجرا
        env:
          MODE: ${{ github.event.inputs.mode }}
          QUERY: ${{ github.event.inputs.query }}
          MAX: ${{ github.event.inputs.max_items }}
          SPLIT_MB: ${{ github.event.inputs.split_mb }}
          VIDEO_QUALITY: ${{ github.event.inputs.video_quality }}
        run: |
          python3 << 'PYEOF'
          import os, re, sys, subprocess, json, shutil
          from pathlib import Path
          from datetime import datetime
          from urllib.parse import quote_plus, urljoin
          import requests
          from bs4 import BeautifulSoup

          mode = os.environ['MODE']
          query = os.environ['QUERY'].strip()
          max_items = int(os.environ.get('MAX', 3))
          split_mb = int(os.environ.get('SPLIT_MB', 70))
          video_quality = os.environ.get('VIDEO_QUALITY', '480')

          H = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          def sanitize(name, maxlen=40):
              s = re.sub(r'[<>:"/\\|?*]', '_', name)
              s = re.sub(r'_+', '_', s).strip('_')
              if not s:
                  s = "video"
              return s[:maxlen]

          # ======================
          #  MODE: SEARCH (DuckDuckGo)
          # ======================
          if mode == 'search (جستجوی وب)':
              print(f'🔍 جستجوی وب: {query}')
              try:
                  url = 'https://html.duckduckgo.com/html/'
                  resp = requests.post(url, data={'q': query}, headers=H, timeout=15)
                  if resp.status_code == 200:
                      soup = BeautifulSoup(resp.text, 'html.parser')
                      results = []
                      for item in soup.select('.result')[:max_items]:
                          a = item.select_one('.result__title a, .result__title .result__link')
                          if not a:
                              a = item.select_one('a')
                          if not a:
                              continue
                          title = a.get_text(strip=True)
                          raw = a.get('href', '')
                          if 'uddg=' in raw:
                              raw = raw.split('uddg=')[-1].split('&')[0]
                              raw = requests.utils.unquote(raw)
                          snippet = item.select_one('.result__snippet')
                          desc = snippet.get_text(strip=True) if snippet else ''
                          results.append({'title': title[:80], 'url': raw, 'desc': desc[:120]})
                      
                      if results:
                          ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
                          qs = re.sub(r'[^\w]', '_', query)[:30]
                          Path('searches').mkdir(exist_ok=True)
                          f = Path(f'searches/{qs}_{ts}.md')
                          md = f'# 🔍 {query}\n\n| # | Title | URL | Description |\n|---|---|---|---|\n'
                          for i, r in enumerate(results, 1):
                              md += f'| {i} | {r["title"]} | [Link]({r["url"]}) | {r["desc"]} |\n'
                          f.write_text(md)
                          print(f'✅ گزارش: {f}')
                      else:
                          print('😞 نتیجه‌ای یافت نشد')
                  else:
                      print(f'⚠️ خطای {resp.status_code}')
              except Exception as e:
                  print(f'❌ {e}')

          # ======================
          #  MODE: SCRAPE (and convert)
          # ======================
          elif mode == 'scrape (دانلود و تبدیل ویدیو از صفحه)':
              url = query
              if not url.startswith('http'):
                  url = 'https://' + url

              print(f'🕷️ اسکریپ: {url}')
              
              # یک پوشه موقت برای دانلود اولیه
              tmp_dir = Path('/tmp/dl_' + datetime.now().strftime('%Y%m%d%H%M%S'))
              tmp_dir.mkdir(exist_ok=True)

              # ۱) دانلود با yt-dlp (با محدودیت کیفیت)
              print('🎥 جستجوی ویدیوها...')
              quality_map = {
                  'best': 'bestvideo+bestaudio/best',
                  '1080': 'bestvideo[height<=1080]+bestaudio/best[height<=1080]',
                  '720': 'bestvideo[height<=720]+bestaudio/best[height<=720]',
                  '480': 'bestvideo[height<=480]+bestaudio/best[height<=480]',
                  '360': 'bestvideo[height<=360]+bestaudio/best[height<=360]'
              }
              fmt = quality_map.get(video_quality, 'bestvideo[height<=480]+bestaudio/best[height<=480]')

              cmd = [
                  'yt-dlp',
                  '-f', fmt,
                  '-o', str(tmp_dir / '%(title)s.%(ext)s'),
                  '--merge-output-format', 'mp4',
                  '--user-agent', H['User-Agent'],
                  '--max-downloads', str(max_items),
                  '--no-warnings',
                  url
              ]
              subprocess.run(cmd, check=False)

              # ۲) پیدا کردن همه فایل‌های دانلود شده
              videos = list(tmp_dir.glob('*.mp4')) + list(tmp_dir.glob('*.mkv')) + list(tmp_dir.glob('*.webm'))
              if not videos:
                  # شاید هیچی نبود، تلاش با کیفیت پایین‌تر
                  print('⚠️ ویدیویی با کیفیت درخواستی یافت نشد، تلاش با best...')
                  subprocess.run(['yt-dlp', '-f', 'best', '-o', str(tmp_dir / '%(title)s.%(ext)s'),
                                  '--merge-output-format', 'mp4', '--user-agent', H['User-Agent'],
                                  '--max-downloads', str(max_items), url], check=False)
                  videos = list(tmp_dir.glob('*.mp4')) + list(tmp_dir.glob('*.mkv')) + list(tmp_dir.glob('*.webm'))

              if not videos:
                  print('😞 هیچ ویدیویی دانلود نشد. شاید صفحه امنیتی دارد یا ویدیو وجود ندارد.')
                  sys.exit(0)

              # پردازش هر ویدیو
              for video_path in videos:
                  title = video_path.stem
                  safe_title = sanitize(title)
                  out_dir = Path('downloads') / safe_title
                  out_dir.mkdir(parents=True, exist_ok=True)

                  final_path = out_dir / (video_path.name)

                  # اگر کیفیت درخواستی عددی است و فایل اصلی کیفیت بالاتری دارد، تبدیل کن
                  if video_quality.isdigit() and video_path.suffix == '.mp4':
                      try:
                          # تشخیص رزولوشن فعلی
                          probe = subprocess.check_output(
                              ['ffprobe', '-v', 'error', '-select_streams', 'v:0',
                               '-show_entries', 'stream=height', '-of', 'csv=p=0',
                               str(video_path)], text=True).strip()
                          current_height = int(probe) if probe.isdigit() else None
                          target_height = int(video_quality)
                          if current_height and current_height > target_height:
                              print(f'🔄 تبدیل {video_path.name} از {current_height}p به {target_height}p...')
                              converted = out_dir / f'{safe_title}_{target_height}p.mp4'
                              subprocess.run([
                                  'ffmpeg', '-i', str(video_path),
                                  '-vf', f'scale=-2:{target_height}', '-c:v', 'libx264', '-crf', '23',
                                  '-c:a', 'aac', '-b:a', '128k', '-movflags', '+faststart',
                                  '-y', str(converted)
                              ], check=False)
                              if converted.exists():
                                  video_path.unlink()  # پاک کردن فایل اصلی
                                  final_path = converted
                      except Exception as e:
                          print(f'⚠️ خطا در تبدیل: {e}')

                  # انتقال به پوشه نهایی اگر هنوز انتقال نیافته
                  if final_path != video_path:
                      shutil.move(str(video_path), str(final_path))
                  else:
                      # اگر هنوز در tmp_dir است، انتقال بده
                      shutil.move(str(video_path), str(out_dir / video_path.name))

                  size_mb = final_path.stat().st_size / 1e6
                  print(f'✅ ذخیره شد: {safe_title}/{final_path.name} ({size_mb:.1f}MB)')

                  # تیکه‌تکه کردن اگر لازم بود
                  if split_mb > 0 and size_mb > split_mb:
                      print(f'✂️ تکه‌تکه‌سازی...')
                      subprocess.run([
                          'zip', '-j', '-s', f'{split_mb}m',
                          str(out_dir / f'{safe_title}.zip'),
                          str(final_path)
                      ], check=False)
                      # اگر zip با موفقیت ایجاد شد، فایل اصلی را پاک کن
                      if list(out_dir.glob(f'{safe_title}.z*')):
                          final_path.unlink()

              # ۳) فایل‌های غیر ویدیویی هم چک کن
              try:
                  resp = requests.get(url, headers=H, timeout=15, allow_redirects=True)
                  if resp.status_code == 200:
                      soup = BeautifulSoup(resp.text, 'html.parser')
                      for a in soup.find_all('a', href=True):
                          href = urljoin(resp.url, a['href'])
                          if any(href.lower().endswith(ext) for ext in ['.zip','.rar','.7z','.exe','.pdf','.iso','.apk']):
                              fname = href.split('/')[-1].split('?')[0]
                              dest = Path('downloads') / sanitize(fname, 30)
                              dest.mkdir(parents=True, exist_ok=True)
                              subprocess.run(['curl', '-L', '-A', H['User-Agent'], '-o', str(dest / fname), href], check=False)
              except: pass

              # پاکسازی پوشه موقت
              shutil.rmtree(tmp_dir, ignore_errors=True)
              print('🎉 عملیات اسکریپ به پایان رسید.')
          PYEOF

      - name: 📤 آپلود
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p downloads searches
          git add downloads/ searches/ 2>/dev/null
          git diff --cached --quiet && exit 0
          git commit -m "📦 [${MODE}] ${QUERY:0:50}" --quiet
          for i in 1 2 3; do
            git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null && exit 0
            sleep 3
          done
